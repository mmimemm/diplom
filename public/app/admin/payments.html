<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплаты — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'"><span>IT-MANIA</span></div>
  <a href="dashboard.html"><span class="icon">📊</span> Дашборд</a>
  <a href="users.html"><span class="icon">👥</span> Пользователи</a>
  <a href="groups.html"><span class="icon">🏫</span> Группы</a>
  <a href="applications.html"><span class="icon">📋</span> Заявки</a>
  <a href="courses.html"><span class="icon">📚</span> Курсы</a>
  <a href="payments.html" class="active"><span class="icon">💳</span> Оплаты</a>
  <a href="reviews.html"><span class="icon">⭐</span> Отзывы</a>
  <a href="tickets.html"><span class="icon">🎫</span> Билетики</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="shop-admin.html"><span class="icon">🎪</span> Магазин</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a><a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>💳 Оплаты</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button><button class="notif-btn" onclick="toggleNotificationsPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">A</div>
    </div>
  </div>

  <!-- Итоги -->
  <div class="stats-grid" id="payStats"></div>

  <!-- График -->
  <div class="content-card">
    <h2>Доходы по типам курсов</h2>
    <canvas id="payChart" height="120"></canvas>
  </div>

  <!-- Таблица -->
  <div class="content-card">
    <h2>Все оплаты</h2>
    <div id="payTable"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['admin']);

  const typeLabel = { weekday: 'Будни', weekend: 'Выходные', online: 'Онлайн' };
  const typePrice = { weekday: 7500, weekend: 8200, online: 15000 };

  async function init() {
    const me = await api("/api/auth/me");
    if (me && typeof updateTopbarAvatar === "function") {
      await updateTopbarAvatar(me);
    }
    const payments = await api('/api/payments') || [];

    // Считаем итоги
    const total = payments.reduce((s, p) => s + (p.amount || 0), 0);
    const byType = { weekday: 0, weekend: 0, online: 0 };
    payments.forEach(p => { if (byType[p.type] !== undefined) byType[p.type] += p.amount || 0; });

    document.getElementById('payStats').innerHTML = `
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-info"><h3>${total.toLocaleString('ru')}₽</h3><p>Всего получено</p></div></div>
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-info"><h3>${payments.length}</h3><p>Оплат всего</p></div></div>
      <div class="stat-card"><div class="stat-icon">🏫</div><div class="stat-info"><h3>${byType.weekday.toLocaleString('ru')}₽</h3><p>Будни</p></div></div>
      <div class="stat-card"><div class="stat-icon">🌅</div><div class="stat-info"><h3>${byType.weekend.toLocaleString('ru')}₽</h3><p>Выходные</p></div></div>
      <div class="stat-card"><div class="stat-icon">💻</div><div class="stat-info"><h3>${byType.online.toLocaleString('ru')}₽</h3><p>Онлайн</p></div></div>
    `;

    // График
    new Chart(document.getElementById('payChart'), {
      type: 'bar',
      data: {
        labels: ['Будни', 'Выходные', 'Онлайн'],
        datasets: [{ label: 'Сумма (₽)', data: [byType.weekday, byType.weekend, byType.online],
          backgroundColor: ['rgba(153,0,255,0.7)', 'rgba(255,105,180,0.7)', 'rgba(187,68,255,0.7)'],
          borderRadius: 10 }]
      },
      options: { plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, grid: { color: '#f0e8ff' } }, x: { grid: { display: false } } } }
    });

    // Таблица
    if (!payments.length) {
      document.getElementById('payTable').innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Оплат пока нет</p>';
      return;
    }
    document.getElementById('payTable').innerHTML = `
      <table class="app-table">
        <thead><tr><th>Дата</th><th>Ученик</th><th>Тип</th><th>Сумма</th><th>Статус</th></tr></thead>
        <tbody>
          ${payments.map(p => `
            <tr>
              <td style="color:#888;font-size:0.85rem;">${new Date(p.createdAt).toLocaleDateString('ru')}</td>
              <td style="font-weight:600;">${p.studentId?.firstName || ''} ${p.studentId?.lastName || ''}</td>
              <td>${typeLabel[p.type] || p.type}</td>
              <td style="font-weight:700;color:var(--accent);">${(p.amount||0).toLocaleString('ru')}₽</td>
              <td><span class="badge badge-success">✓ Оплачено</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
