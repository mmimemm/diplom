<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'"><span>IT-MANIA</span></div>
  <a href="dashboard.html"><span class="icon">📊</span> Дашборд</a>
  <a href="users.html"><span class="icon">👥</span> Пользователи</a>
  <a href="groups.html"><span class="icon">🏫</span> Группы</a>
  <a href="applications.html"><span class="icon">📋</span> Заявки</a>
  <a href="courses.html"><span class="icon">📚</span> Курсы</a>
  <a href="payments.html"><span class="icon">💳</span> Оплаты</a>
  <a href="reviews.html" class="active"><span class="icon">⭐</span> Отзывы</a>
  <a href="tickets.html"><span class="icon">🎫</span> Билетики</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="shop-admin.html"><span class="icon">🎪</span> Магазин</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a><a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>

<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>⭐ Отзывы</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn" onclick="toggleNotificationsPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">A</div>
    </div>
  </div>

  <div class="content-card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
      <h2 style="margin:0;">⭐ Модерация отзывов</h2>
      <button type="button" onclick="init()" style="background:var(--bg);border:none;border-radius:20px;padding:8px 16px;font-weight:700;cursor:pointer;font-family:inherit;">🔄 Обновить</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;color:#888;font-size:0.9rem;">
      <span class="badge badge-purple">Ожидают: <b id="pendingCount">0</b></span>
      <span class="badge badge-success">Опубликованы: <b id="approvedCount">0</b></span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="content-card">
      <h2>⏳ Ожидают публикации</h2>
      <div id="pendingReviews"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
    </div>

    <div class="content-card">
      <h2>✅ Опубликованные</h2>
      <div id="approvedReviews"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
    </div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['admin']);

  async function init() {
    const me = await api("/api/auth/me");
    if (me && typeof updateTopbarAvatar === "function") {
      await updateTopbarAvatar(me);
    }
    const all = await api('/api/admin/reviews') || [];
    const pending = all.filter(r => !r.isApproved);
    const approved = all.filter(r => r.isApproved);

    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('approvedCount').textContent = approved.length;

    renderReviews('pendingReviews', pending, false);
    renderReviews('approvedReviews', approved, true);
    loadNotifications();
  }

  function renderReviews(containerId, reviews, isApproved) {
    const el = document.getElementById(containerId);
    if (!el) return;

    if (!reviews.length) {
      el.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Нет отзывов</p>';
      return;
    }

    el.innerHTML = reviews.map(r => `
      <div style="background:var(--bg);border-radius:16px;padding:14px 16px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;">
          <div>
            <div style="font-weight:700;">${r.name || 'Без имени'}</div>
            <div style="color:#888;font-size:0.8rem;">${r.role || ''} · ${new Date(r.createdAt).toLocaleDateString('ru')}</div>
          </div>
          ${!isApproved ? `
            <button onclick="approveReview('${r._id}')"
              style="background:var(--accent);color:white;border:none;border-radius:20px;padding:5px 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.8rem;white-space:nowrap;">
              Опубликовать
            </button>
          ` : '<span class="badge badge-success">✓ Опубликован</span>'}
        </div>
        <p style="font-size:0.9rem;line-height:1.5;white-space:pre-wrap;">${r.text || ''}</p>
      </div>
    `).join('');
  }

  async function approveReview(id) {
    const res = await api(`/api/reviews/${id}/approve`, { method: 'PATCH' });
    if (res) {
      showToast('Отзыв опубликован ✅');
      playSound('success');
      init();
    }
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
