<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Группы — IT-MANIA</title>
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'"><span>IT-MANIA</span></div>
  <a href="dashboard.html"><span class="icon">📊</span> Дашборд</a>
  <a href="users.html"><span class="icon">👥</span> Пользователи</a>
  <a href="groups.html" class="active"><span class="icon">🏫</span> Группы</a>
  <a href="applications.html"><span class="icon">📋</span> Заявки</a>
  <a href="courses.html"><span class="icon">📚</span> Курсы</a>
  <a href="payments.html"><span class="icon">💳</span> Оплаты</a>
  <a href="reviews.html"><span class="icon">⭐</span> Отзывы</a>
  <a href="tickets.html"><span class="icon">🎫</span> Тикеты</a>
  <div class="sidebar-bottom">
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>

<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>🏫 Группы</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn" onclick="toggleNotificationsPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar">A</div>
    </div>
  </div>

  <div class="content-card">
    <h2>➕ Создать группу</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <input id="gName" type="text" placeholder="Название группы *" style="border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;">
      <select id="gTeacher" style="border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;">
        <option value="">Преподаватель *</option>
      </select>
      <select id="gCourse" style="border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;">
        <option value="">Курс</option>
      </select>
    </div>
    <div style="margin-top:12px;">
      <label for="gStudents" style="display:block;margin-bottom:8px;font-weight:700;">Ученики (можно выбрать несколько)</label>
      <select id="gStudents" multiple style="width:100%;min-height:160px;border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;"></select>
      <small style="color:#888;display:block;margin-top:6px;">Выбранные ученики автоматически будут добавлены в группу</small>
    </div>
    <button onclick="createGroup()" class="btn-accent" style="margin-top:12px;border-radius:20px;padding:10px 28px;">Создать группу</button>
  </div>

  <div id="groupsList"></div>

  <div class="content-card" id="editGroupCard" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
      <h2 style="margin:0;">✏️ Редактировать группу</h2>
      <button type="button" onclick="closeEditGroup()" style="background:var(--bg);border:none;border-radius:20px;padding:8px 16px;font-weight:700;cursor:pointer;font-family:inherit;">Отмена</button>
    </div>
    <input type="hidden" id="editGroupId">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px;">
      <input id="editGroupName" type="text" placeholder="Название группы *" style="border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;">
      <select id="editGroupTeacher" style="border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;">
        <option value="">Преподаватель *</option>
      </select>
      <select id="editGroupCourse" style="border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;">
        <option value="">Курс</option>
      </select>
    </div>
    <div style="margin-top:12px;">
      <label for="editGroupStudents" style="display:block;margin-bottom:8px;font-weight:700;">Ученики группы</label>
      <select id="editGroupStudents" multiple style="width:100%;min-height:180px;border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;"></select>
      <small style="color:#888;display:block;margin-top:6px;">Сохранение заменит состав группы на выбранных учеников</small>
    </div>
    <button type="button" onclick="saveGroup()" class="btn-accent" style="margin-top:12px;border-radius:20px;padding:10px 28px;">Сохранить изменения</button>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['admin']);

  let teachersCache = [];
  let coursesCache = [];
  let studentsCache = [];
  let groupsCache = [];

  function fillSelect(select, items, formatter) {
    if (!select) return;
    const placeholder = select.querySelector('option');
    select.innerHTML = placeholder ? placeholder.outerHTML : '';
    items?.forEach(item => {
      const option = document.createElement('option');
      option.value = item._id;
      option.textContent = formatter(item);
      select.appendChild(option);
    });
  }

  function fillMultiSelect(select, items, formatter, selectedIds = []) {
    if (!select) return;
    const placeholder = select.querySelector('option');
    select.innerHTML = placeholder ? placeholder.outerHTML : '';
    const selectedSet = new Set(selectedIds.map(id => String(id)));
    items?.forEach(item => {
      const option = document.createElement('option');
      option.value = item._id;
      option.textContent = formatter(item);
      option.selected = selectedSet.has(String(item._id));
      select.appendChild(option);
    });
  }

  function getStudentIdsFromGroup(group) {
    return (group.students || []).map(student => student._id || student);
  }

  async function init() {
    const [teachers, courses, students] = await Promise.all([
      api('/api/admin/users?role=teacher'),
      api('/api/courses'),
      api('/api/admin/users?role=student')
    ]);

    teachersCache = teachers || [];
    coursesCache = courses || [];
    studentsCache = students || [];

    const teacherLabel = t => `${t.lastName || ''} ${t.firstName || ''}`.trim() || t.login || 'Преподаватель';
    const studentLabel = s => `${s.lastName || ''} ${s.firstName || ''}`.trim() || s.login || 'Ученик';
    const courseLabel = c => c.title || 'Без названия';

    fillSelect(document.getElementById('gTeacher'), teachersCache, teacherLabel);
    fillSelect(document.getElementById('gCourse'), coursesCache, courseLabel);
    fillMultiSelect(document.getElementById('gStudents'), studentsCache, studentLabel);

    fillSelect(document.getElementById('editGroupTeacher'), teachersCache, teacherLabel);
    fillSelect(document.getElementById('editGroupCourse'), coursesCache, courseLabel);
    fillMultiSelect(document.getElementById('editGroupStudents'), studentsCache, studentLabel);

    await loadGroups();
  }

  async function loadGroups() {
    const groups = await api('/api/admin/groups') || [];
    groupsCache = groups;
    window._groupsCache = groupsCache;

    const container = document.getElementById('groupsList');

    if (!groups.length) {
      container.innerHTML = '<div class="content-card"><p style="color:#888;text-align:center;padding:30px;">Групп пока нет</p></div>';
      return;
    }

    container.innerHTML = groups.map(g => `
      <div class="content-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
          <div>
            <h2 style="margin:0;">🏫 ${g.name}</h2>
            <p style="color:#888;font-size:0.9rem;margin-top:4px;">
              Преподаватель: <b>${g.teacherId?.lastName || ''} ${g.teacherId?.firstName || '—'}</b>
              ${g.courseId ? `· Курс: <b>${g.courseId.title}</b>` : ''}
            </p>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <span class="badge badge-purple">${g.students?.length || 0} учеников</span>
            <button type="button" onclick="openEditGroup('${g._id}')" style="background:var(--bg);border:none;border-radius:20px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit;">✏️ Редактировать</button>
            <button type="button" onclick="removeGroup('${g._id}','${(g.name || '').replace(/'/g, "\\'")}')" style="background:#ffe8e8;color:#cc0000;border:none;border-radius:20px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit;">🗑️ Удалить</button>
          </div>
        </div>
        ${g.students?.length ? `
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${g.students.map(s => `
              <div style="background:var(--bg);border-radius:12px;padding:6px 14px;font-size:0.85rem;font-weight:600;">
                ${s.lastName || ''} ${s.firstName || ''}
                <span style="color:var(--accent);margin-left:6px;">${s.xp || 0} XP</span>
              </div>
            `).join('')}
          </div>
        ` : '<p style="color:#888;font-size:0.9rem;">Учеников пока нет</p>'}
      </div>
    `).join('');
  }

  async function createGroup() {
    const name = document.getElementById('gName').value.trim();
    const teacherId = document.getElementById('gTeacher').value;
    const courseId = document.getElementById('gCourse').value;
    const studentIds = Array.from(document.getElementById('gStudents').selectedOptions).map(option => option.value);

    if (!name || !teacherId) {
      showToast('Заполните название и преподавателя', 'error');
      return;
    }

    const res = await api('/api/admin/groups', {
      method: 'POST',
      body: JSON.stringify({ name, teacherId, courseId: courseId || undefined, studentIds })
    });

    if (res) {
      showToast('Группа создана! 🏫');
      playSound('success');
      spawnStars(8);
      document.getElementById('gName').value = '';
      Array.from(document.getElementById('gStudents').options).forEach(option => option.selected = false);
      loadGroups();
    }
  }

  function openEditGroup(groupId) {
    const group = groupsCache.find(g => String(g._id) === String(groupId));
    if (!group) return;

    document.getElementById('editGroupId').value = group._id;
    document.getElementById('editGroupName').value = group.name || '';
    document.getElementById('editGroupTeacher').value = group.teacherId?._id || group.teacherId || '';
    document.getElementById('editGroupCourse').value = group.courseId?._id || group.courseId || '';

    const selectedStudentIds = getStudentIdsFromGroup(group);
    fillMultiSelect(
      document.getElementById('editGroupStudents'),
      studentsCache,
      s => `${s.lastName || ''} ${s.firstName || ''}`.trim() || s.login || 'Ученик',
      selectedStudentIds
    );

    document.getElementById('editGroupCard').style.display = 'block';
    document.getElementById('editGroupCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeEditGroup() {
    document.getElementById('editGroupCard').style.display = 'none';
    document.getElementById('editGroupId').value = '';
  }

  async function saveGroup() {
    const id = document.getElementById('editGroupId').value;
    const name = document.getElementById('editGroupName').value.trim();
    const teacherId = document.getElementById('editGroupTeacher').value;
    const courseId = document.getElementById('editGroupCourse').value;
    const studentIds = Array.from(document.getElementById('editGroupStudents').selectedOptions).map(option => option.value);

    if (!id || !name || !teacherId) {
      showToast('Заполните название и преподавателя', 'error');
      return;
    }

    const res = await api(`/api/admin/groups/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ name, teacherId, courseId: courseId || undefined, studentIds })
    });

    if (res) {
      showToast('Группа обновлена ✅');
      playSound('success');
      spawnStars(8);
      closeEditGroup();
      loadGroups();
    }
  }

  async function removeGroup(id, name) {
    if (!confirm(`Удалить группу «${name}»? Ученики будут отвязаны от группы.`)) return;

    const res = await api(`/api/admin/groups/${id}`, { method: 'DELETE' });
    if (res) {
      showToast('Группа удалена 🗑️');
      playSound('close');
      if (document.getElementById('editGroupId').value === id) closeEditGroup();
      loadGroups();
    }
  }

  init();
</script>
</body>
</html>
