<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Песочница — IT-MANIA</title>
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
  <style>
    .sandbox-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; height:calc(100vh - 140px); }
    .editor-panel { display:flex; flex-direction:column; }
    .preview-panel { background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .preview-panel iframe { width:100%; height:100%; border:none; }
    .lang-tabs { display:flex; gap:6px; margin-bottom:10px; }
    .lang-tab { padding:6px 16px; border-radius:20px; border:2px solid #eee; background:none; font-weight:700; cursor:pointer; font-family:inherit; font-size:0.85rem; transition:0.3s; }
    .lang-tab.active { background:var(--accent); color:white; border-color:var(--accent); }
    #monacoSandbox { flex:1; border-radius:0 0 16px 16px; overflow:hidden; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="lessons.html"><span class="icon">📚</span> Мои уроки</a>
  <a href="progress-map.html"><span class="icon">🗺️</span> Карта прогресса</a>
  <a href="sandbox.html" class="active"><span class="icon">🧪</span> Песочница</a>
  <a href="shop.html"><span class="icon">🎪</span> Магазин</a>
  <a href="leaderboard.html"><span class="icon">🏆</span> Рейтинг</a>
  <a href="tickets.html"><span class="icon">🎫</span> Мои тикеты</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content" style="padding:16px;">
  <div class="topbar" style="margin-bottom:12px;">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>🧪 Песочница</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <div class="lang-tabs">
    <button class="lang-tab active" onclick="setLang('javascript',this)">JavaScript</button>
    <button class="lang-tab" onclick="setLang('html',this)">HTML</button>
    <button class="lang-tab" onclick="setLang('css',this)">CSS</button>
    <button class="lang-tab" onclick="setLang('python',this)">Python</button>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button onclick="runSandbox()" style="background:var(--accent);color:white;border:none;border-radius:20px;padding:8px 20px;font-weight:700;cursor:pointer;font-family:inherit;">▶ Запустить</button>
      <button onclick="clearSandbox()" style="background:var(--bg);border:none;border-radius:20px;padding:8px 16px;font-weight:700;cursor:pointer;font-family:inherit;">🗑 Очистить</button>
    </div>
  </div>

  <div class="sandbox-layout">
    <div class="editor-panel">
      <div style="background:#1e1e1e;border-radius:16px 16px 0 0;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;">
        <span style="color:#888;font-size:0.85rem;" id="sandboxLangLabel">JavaScript</span>
        <span style="color:#555;font-size:0.75rem;">Ctrl+Enter — запустить</span>
      </div>
      <div id="monacoSandbox"></div>
    </div>
    <div class="preview-panel">
      <div style="background:#f5f5f5;padding:8px 16px;font-size:0.85rem;font-weight:600;color:#888;border-bottom:1px solid #eee;">
        Результат
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts"></iframe>
      <div id="consoleOutput" style="background:#1e1e1e;color:#4ec9b0;font-family:monospace;font-size:0.85rem;padding:12px 16px;max-height:120px;overflow-y:auto;display:none;"></div>
    </div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['student']);

  let sandboxEditor = null;
  let currentLang = 'javascript';

  const starterCode = {
    javascript: '// Привет! Пиши код здесь\nconsole.log("Привет, мир!");\n',
    html: '<!DOCTYPE html>\n<html>\n<head><style>body{font-family:sans-serif;background:#f0e8ff;}</style></head>\n<body>\n  <h1 style="color:#9900FF">Привет, IT-MANIA! 🚀</h1>\n  <p>Создай что-нибудь крутое!</p>\n</body>\n</html>',
    css: '/* CSS песочница */\nbody {\n  background: linear-gradient(135deg, #9900FF, #BB44FF);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  height: 100vh;\n  margin: 0;\n}\n.box {\n  background: white;\n  border-radius: 20px;\n  padding: 40px;\n  font-size: 2rem;\n  font-weight: 800;\n  color: #9900FF;\n}',
    python: '# Python запускается на сервере\nprint("Привет, мир!")\nfor i in range(5):\n    print(f"Число: {i}")\n'
  };

  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });
  require(['vs/editor/editor.main'], () => {
    sandboxEditor = monaco.editor.create(document.getElementById('monacoSandbox'), {
      value: starterCode.javascript,
      language: 'javascript',
      theme: 'vs-dark',
      fontSize: 14,
      minimap: { enabled: false },
      automaticLayout: true,
      scrollBeyondLastLine: false,
      padding: { top: 12 }
    });

    // Ctrl+Enter — запуск
    sandboxEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runSandbox);
  });

  async function init() {
    const user = await api('/api/auth/me');
    if (user) document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
  }

  function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sandboxLangLabel').textContent = btn.textContent;
    if (sandboxEditor) {
      monaco.editor.setModelLanguage(sandboxEditor.getModel(), lang === 'python' ? 'python' : lang);
      sandboxEditor.setValue(starterCode[lang] || '');
    }
    playSound('ding');
  }

  async function runSandbox() {
    if (!sandboxEditor) return;
    const code = sandboxEditor.getValue();
    playSound('ding');

    if (currentLang === 'html') {
      document.getElementById('previewFrame').style.display = 'block';
      document.getElementById('consoleOutput').style.display = 'none';
      document.getElementById('previewFrame').srcdoc = code;
      return;
    }

    if (currentLang === 'css') {
      const html = `<html><head><style>${code}</style></head><body><div class="box">IT-MANIA 🚀</div></body></html>`;
      document.getElementById('previewFrame').style.display = 'block';
      document.getElementById('consoleOutput').style.display = 'none';
      document.getElementById('previewFrame').srcdoc = html;
      return;
    }

    // JS и Python — через сервер
    document.getElementById('previewFrame').style.display = 'none';
    document.getElementById('consoleOutput').style.display = 'block';
    document.getElementById('consoleOutput').textContent = 'Запуск...';

    const res = await api('/api/run-code', { method: 'POST', body: JSON.stringify({ code, language: currentLang }) });
    const out = document.getElementById('consoleOutput');
    out.textContent = '> ' + (res?.output || '(нет вывода)');
    out.style.color = res?.error ? '#f44747' : '#4ec9b0';
    playSound(res?.error ? 'error' : 'success');
  }

  function clearSandbox() {
    if (sandboxEditor) sandboxEditor.setValue(starterCode[currentLang] || '');
    document.getElementById('previewFrame').srcdoc = '';
    document.getElementById('consoleOutput').textContent = '';
    playSound('ding');
  }

  init();
</script>
</body>
</html>
