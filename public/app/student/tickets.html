<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обращения — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  textarea, input {
    box-sizing: border-box;
    width: 100%;
  }
  @media (max-width: 480px) {
    .content-card { padding: 12px !important; }
    #tSubject, #tMessage { padding: 8px 12px !important; font-size: 0.9rem !important; }
    .btn-accent { width: 100%; }
  }
  @media (max-width: 360px) {
    #tSubject, #tMessage { padding: 6px 10px !important; font-size: 0.85rem !important; }
  }
  .content-card, .main-content { width: 100% !important; max-width: 100% !important; }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="lessons.html"><span class="icon">📚</span> Мои уроки</a>
  <a href="progress-map.html"><span class="icon">🗺️</span> Карта прогресса</a>
  <a href="submissions.html"><span class="icon">📋</span> Задания</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="sandbox.html"><span class="icon">🧪</span> Песочница</a>
  <a href="shop.html"><span class="icon">🎪</span> Магазин</a>
  <a href="leaderboard.html"><span class="icon">🏆</span> Рейтинг</a>
  <a href="tickets.html" class="active"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar scroll-anim scroll-anim-fade-up">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>🎫 Мои обращения</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <!-- Новое обращение -->
  <div class="content-card scroll-anim scroll-anim-fade-up">
    <h2>✉️ Новое обращение</h2>
    <input id="tSubject" type="text" placeholder="Тема обращения"
      style="width:100%;border:2px solid #eee;border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;margin-bottom:10px;">
    <textarea id="tMessage" placeholder="Опишите вашу проблему или вопрос..." rows="4"
      style="width:100%;border:2px solid #eee;border-radius:20px;padding:12px 16px;font-family:inherit;outline:none;resize:none;"></textarea>
    <button onclick="createTicket()" class="btn-accent" style="margin-top:10px;border-radius:20px;padding:10px 28px;">
      Отправить обращение
    </button>
  </div>

  <!-- Мои тикеты -->
  <div class="content-card scroll-anim scroll-anim-fade-up">
    <h2>Мои обращения</h2>
    <div id="myTickets"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['student', 'parent', 'teacher']);

  async function init() {
    const user = await api('/api/auth/me');
    if (user) {
      if (typeof updateTopbarAvatar === 'function') {
        await updateTopbarAvatar(user);
      } else {
        document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
      }
    }
    loadTickets();
  }

  async function loadTickets() {
    const tickets = await api('/api/tickets') || [];
    const el = document.getElementById('myTickets');
    const statusLabel = { open: '🔴 Открыт', in_progress: '🟡 В работе', closed: '🟢 Закрыт' };

    if (!tickets.length) {
      el.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Обращений пока нет</p>';
      return;
    }

    el.innerHTML = tickets.map(t => `
      <div style="background:var(--bg);border-radius:16px;padding:14px 18px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:700;">${t.subject || 'Без темы'}</span>
          <span class="badge ${t.status==='open'?'badge-danger':t.status==='in_progress'?'badge-warn':'badge-success'}">${statusLabel[t.status]}</span>
        </div>
        <p style="font-size:0.9rem;color:#555;margin-bottom:6px;">${t.message || ''}</p>
        ${t.replies?.length ? `
          <div style="border-top:1px solid rgba(153,0,255,0.1);margin-top:8px;padding-top:8px;">
            <p style="font-size:0.8rem;color:#888;margin-bottom:4px;">Ответы (${t.replies.length}):</p>
            ${t.replies.map(r => `
              <div style="background:var(--accent);color:white;border-radius:12px;padding:8px 12px;font-size:0.85rem;margin-bottom:4px;">
                ${r.text}
              </div>
            `).join('')}
          </div>
        ` : ''}
        <div style="font-size:0.75rem;color:#aaa;margin-top:6px;">${new Date(t.createdAt).toLocaleString('ru')}</div>
      </div>
    `).join('');
  }

  async function createTicket() {
    const subject = document.getElementById('tSubject').value.trim();
    const message = document.getElementById('tMessage').value.trim();
    if (!message) { showToast('Напишите сообщение', 'error'); return; }
    const res = await api('/api/tickets', { method: 'POST', body: JSON.stringify({ subject, message }) });
    if (res) {
      showToast('Обращение отправлено! ✅');
      playSound('success');
      document.getElementById('tSubject').value = '';
      document.getElementById('tMessage').value = '';
      loadTickets();
    }
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
