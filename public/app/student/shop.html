<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
    .shop-item {
      background:white; border-radius:20px; padding:20px; text-align:center;
      box-shadow:0 2px 12px rgba(0,0,0,0.06); transition:0.3s; position:relative;
      overflow:hidden; border:2px solid transparent;
    }
    .shop-item:hover { transform:translateY(-6px); box-shadow:0 8px 32px rgba(153,0,255,0.18); border-color:var(--accent); }
    .shop-item .item-icon { font-size:3rem; margin-bottom:10px; }
    .shop-item h3 { font-size:1rem; font-weight:800; margin-bottom:6px; }
    .shop-item p { font-size:0.8rem; color:#888; margin-bottom:14px; }
    .shop-item .price { font-size:1.1rem; font-weight:800; color:var(--accent); margin-bottom:12px; }
    .shop-item .item-type-badge {
      display:inline-block; padding:3px 12px; border-radius:30px;
      font-size:0.7rem; font-weight:700; margin-bottom:8px;
    }
    .shop-item .type-editor_skin { background:#f0e8ff; color:#9900FF; }
    .shop-item .type-avatar { background:#e8f4ff; color:#0066cc; }
    .shop-item .type-pin_project { background:#fff3e0; color:#e65100; }
    .shop-item .type-boost { background:#e8ffe8; color:#00aa44; }
    .shop-item.owned { border-color:#00aa44; background:#f8fff8; }
    .shop-item.owned::after {
      content:'✓'; position:absolute; top:8px; right:8px;
      background:#00aa44; color:white; width:24px; height:24px;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:0.8rem; font-weight:700;
    }
    .shop-closed { text-align:center; padding:60px 20px; }
    .shop-closed .big-icon { font-size:5rem; margin-bottom:16px; }
    .timer-box { background:var(--accent); color:white; border-radius:20px; padding:20px 32px; display:inline-block; margin-top:16px; }
    .timer-box .timer-val { font-size:2rem; font-weight:900; }
    @media (max-width: 480px) {
      .shop-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
      .shop-item { padding: 12px; }
      .shop-item .item-icon { font-size: 2rem; margin-bottom: 6px; }
      .shop-item h3 { font-size: 0.85rem; }
      .shop-item p { font-size: 0.7rem; margin-bottom: 8px; }
      .shop-item .price { font-size: 0.95rem; margin-bottom: 8px; }
      .shop-item .item-type-badge { font-size: 0.6rem; padding: 2px 8px; }
    }
    @media (max-width: 360px) {
      .shop-grid { grid-template-columns: 1fr; }
      .shop-item { padding: 10px; }
    }
    .shop-grid, .content-card, .main-content { width: 100% !important; max-width: 100% !important; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="lessons.html" ><span class="icon">📚</span> Мои уроки</a>
  <a href="progress-map.html"><span class="icon">🗺️</span> Карта прогресса</a>
  <a href="submissions.html"><span class="icon">📋</span> Задания</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="sandbox.html"><span class="icon">🧪</span> Песочница</a>
  <a href="shop.html" class="active"><span class="icon">🎪</span> Магазин</a>
  <a href="leaderboard.html"><span class="icon">🏆</span> Рейтинг</a>
  <a href="tickets.html"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>

<main class="main-content">
  <div class="topbar scroll-anim scroll-anim-fade-up">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>🎪 Магазин</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn" onclick="toggleNotificationsPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar" onclick="location.href='profile.html'" title="Профиль">?</div>
    </div>
  </div>

  <div class="content-card scroll-anim scroll-anim-fade-up" style="display:flex;align-items:center;gap:16px;padding:16px 24px;">
    <span style="font-size:2rem;">🎫</span>
    <div>
      <div style="font-size:1.4rem;font-weight:800;color:var(--accent);" id="myTickets">0</div>
      <div style="color:#888;font-size:0.85rem;">Ваши билетики</div>
    </div>
  </div>

  <div class="content-card scroll-anim scroll-anim-fade-up">
    <h2 class="scroll-anim scroll-anim-fade-up">🧾 Мои покупки</h2>
    <div id="myPurchases" class="stagger-container"></div>
  </div>

  <div id="shopContent"></div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script src="../../js/shop-effects.js"></script>
<script src="../../js/theme-manager.js"></script>
<script>
  requireAuth(['student']);

  function isShopOpen() {
    // Магазин теперь всегда открыт
    return true;
    /*
    const now = new Date();
    const m = now.getMonth() + 1, d = now.getDate();
    return (m === 12 && d >= 25) || (m === 1 && d <= 1) ||
           (m === 5 && d >= 25) || (m === 6) || (m === 7 && d <= 1);
    */
  }

  function nextOpenDate() {
    const now = new Date();
    const m = now.getMonth() + 1, d = now.getDate();
    if (m < 5 || (m === 5 && d < 25)) return new Date(now.getFullYear(), 4, 25);
    if (m < 12 || (m === 12 && d < 25)) return new Date(now.getFullYear(), 11, 25);
    return new Date(now.getFullYear() + 1, 4, 25);
  }

  function renderPurchases(purchases) {
    const el = document.getElementById('myPurchases');
    if (!purchases?.length) {
      el.innerHTML = '<p style="color:#888;text-align:center;padding:16px;">Покупок пока нет</p>';
      return;
    }

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;">
        ${purchases.map(p => `
          <div style="background:var(--bg);border-radius:18px;padding:14px 16px;">
            <div style="font-size:2rem;margin-bottom:6px;">${p.itemId?.icon || '🎁'}</div>
            <div style="font-weight:800;margin-bottom:4px;">${p.itemId?.name || 'Товар'}</div>
            <div style="font-size:0.85rem;color:#888;margin-bottom:8px;">${p.itemId?.description || ''}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.82rem;gap:8px;flex-wrap:wrap;">
              <span class="badge badge-success">Куплено</span>
              <span style="font-weight:700;color:var(--accent);">🎫 ${p.itemId?.price || 0}</span>
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;

    if (typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }
    document.getElementById('myTickets').textContent = user.tickets || 0;

    if (!isShopOpen()) {
      const next = nextOpenDate();
      const diff = next - new Date();
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      document.getElementById('shopContent').innerHTML = `
        <div class="content-card shop-closed">
          <div class="big-icon">🔒</div>
          <h2 style="font-size:1.8rem;font-weight:800;margin-bottom:8px;">Магазин закрыт</h2>
          <p style="color:#888;font-size:1rem;">Магазин открывается 25 мая и 25 декабря.<br>Копите билетики!</p>
          <div class="timer-box">
            <div style="font-size:0.85rem;margin-bottom:4px;">До открытия:</div>
            <div class="timer-val">${days}д ${hours}ч ${mins}м</div>
          </div>
        </div>`;
      document.getElementById('myPurchases').innerHTML = '<p style="color:#888;text-align:center;padding:16px;">Покупки появятся после открытия магазина</p>';
      return;
    }

    const items = await api('/api/shop') || [];
    const purchases = await api('/api/shop/my') || [];
    renderPurchases(purchases);

    // Корректное получение ID купленных товаров
    // purchases[].itemId может быть populated объектом или просто ID
    var boughtIds = new Set();
    purchases.forEach(function(p) {
      var itemId = p.itemId;
      if (itemId && typeof itemId === 'object') {
        boughtIds.add(String(itemId._id));
      } else if (itemId) {
        boughtIds.add(String(itemId));
      }
    });

    if (!items.length) {
      document.getElementById('shopContent').innerHTML = '<div class="content-card"><p style="color:#888;text-align:center;padding:30px;">Товары скоро появятся!</p></div>';
      return;
    }

    document.getElementById('shopContent').innerHTML = `
      <div class="content-card scroll-anim scroll-anim-fade-up">
        <h2 class="scroll-anim scroll-anim-fade-up">🛍️ Доступные товары</h2>
        <div class="shop-grid stagger-container">
          ${items.map(item => {
    const bought = boughtIds.has(String(item._id));
    const canBuy = (user.tickets || 0) >= item.price && !bought;
    const typeNames = { avatar:'Аватар', editor_skin:'Скин редактора', pin_project:'Закрепить проект', boost:'Буст' };
            return `
              <div class="shop-item${bought ? ' owned' : ''}">
                <div class="item-icon">${item.icon || '🎁'}</div>
                <span class="item-type-badge type-${item.type}">${typeNames[item.type] || item.type}</span>
                <h3>${item.name}</h3>
                <p>${item.description || ''}</p>
                <div class="price">🎫 ${item.price}</div>
                <button onclick="buyItem('${item._id}','${item.name}',${item.price})"
                  style="width:100%;padding:10px;border:none;border-radius:20px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.9rem;
                  background:${bought ? '#e8ffe8' : canBuy ? 'var(--accent)' : '#eee'};
                  color:${bought ? '#00aa44' : canBuy ? 'white' : '#aaa'};"
                  ${bought || !canBuy ? 'disabled' : ''}>
                  ${bought ? '✓ Куплено' : canBuy ? 'Купить' : 'Недостаточно 🎫'}
                </button>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  async function buyItem(id, name, price) {
    const res = await api(`/api/shop/buy/${id}`, { method: 'POST' });
    if (res?.ok) {
      document.getElementById('myTickets').textContent = res.tickets;
      showToast(`Куплено: ${name}! 🎉`);
      launchConfetti();
      
      // Получаем свежие данные пользователя и синхронизируем avatarConfig
      const freshUser = await api('/api/auth/me');
      if (freshUser) {
        // Обновляем аватар в топбаре
        if (typeof updateTopbarAvatar === 'function') {
          await updateTopbarAvatar(freshUser);
        }
        
        // Добавляем купленный аватар в avatarConfig.unlockedItems на сервере
        // чтобы при заходе в профиль он уже был разблокирован
        var config = freshUser.avatarConfig || { unlockedItems: [] };
        var unlocked = config.unlockedItems || [];
        // Ищем эффект купленного аватара среди всех товаров
        var items = await api('/api/shop');
        var boughtItem = null;
        if (items) {
          for (var i = 0; i < items.length; i++) {
            if (items[i]._id === id) { boughtItem = items[i]; break; }
          }
        }
        if (boughtItem && boughtItem.effect && boughtItem.type === 'avatar') {
          if (unlocked.indexOf(boughtItem.effect) === -1) {
            unlocked.push(boughtItem.effect);
            config.unlockedItems = unlocked;
            await api('/api/auth/me', { method: 'PATCH', body: JSON.stringify({ avatarConfig: config }) });
          }
        }
      }
      // Применяем эффекты покупки (скины редактора и т.д.)
      if (typeof loadShopEffects === 'function') await loadShopEffects();
      // Перезагружаем магазин (чтобы покупка отобразилась)
      await init();
      updateMonacoTheme?.();
    } else {
      showToast(res?.error || 'Ошибка покупки', 'error');
    }
  }

  init();
</script>
</body>
</html>
