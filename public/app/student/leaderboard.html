<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рейтинг — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="lessons.html" ><span class="icon">📚</span> Мои уроки</a>
  <a href="progress-map.html"><span class="icon">🗺️</span> Карта прогресса</a>
  <a href="submissions.html"><span class="icon">📋</span> Задания</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="sandbox.html"><span class="icon">🧪</span> Песочница</a>
  <a href="shop.html"><span class="icon">🎪</span> Магазин</a>
  <a href="leaderboard.html" class="active"><span class="icon">🏆</span> Рейтинг</a>
  <a href="tickets.html"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar scroll-anim scroll-anim-fade-up">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>🏆 Рейтинг группы</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar" onclick="location.href='profile.html'" title="Профиль">?</div>
    </div>
  </div>

  <!-- Топ-3 подиум -->
  <div class="content-card scroll-anim scroll-anim-fade-up" style="text-align:center;">
    <h2 class="scroll-anim scroll-anim-fade-up">🥇 Топ группы</h2>
    <div id="podium" class="stagger-container" style="display:flex;justify-content:center;align-items:flex-end;gap:16px;padding:20px 0;flex-wrap:wrap;"></div>
  </div>

  <!-- Полный список -->
  <div class="content-card scroll-anim scroll-anim-fade-up">
    <h2 class="scroll-anim scroll-anim-fade-up">Все участники</h2>
    <div id="fullList" class="stagger-container"></div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<style>
  .podium-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .podium-avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 1.2rem;
  }
  .podium-base {
    border-radius: 12px 12px 0 0; display: flex; align-items: center;
    justify-content: center; font-size: 1.5rem; font-weight: 900; color: white;
  }

  /* Адаптивность */
  @media (max-width: 768px) {
    .leaderboard-item { flex-wrap: wrap; gap: 8px; }
    #podium { gap: 8px; }
    .podium-avatar { width: 48px !important; height: 48px !important; font-size: 1.1rem !important; }
    .podium-base { width: 60px !important; height: 50px !important; font-size: 1.1rem !important; }
  }
  @media (max-width: 480px) {
    #podium { gap: 6px; }
    .podium-item { gap: 4px; }
    .podium-avatar { width: 40px !important; height: 40px !important; font-size: 0.9rem !important; }
    .podium-base { width: 50px !important; height: 40px !important; font-size: 1rem !important; }
    .leaderboard-item { flex-wrap: wrap; gap: 6px; padding: 8px 0; }
    .lb-rank { width: 24px; font-size: 1rem; }
    .lb-avatar { width: 30px; height: 30px; font-size: 0.75rem; }
  }
  @media (max-width: 360px) {
    .podium-avatar { width: 36px !important; height: 36px !important; font-size: 0.8rem !important; }
    .podium-base { width: 42px !important; height: 34px !important; font-size: 0.85rem !important; }
    .podium-item .podium-base { width: 42px !important; height: 34px !important; font-size: 0.85rem !important; }
  }
  .main-content, .content-card, .stats-grid, #podium, .leaderboard-item { width: 100% !important; max-width: 100% !important; }
</style>

<script src="../../js/app.js"></script>
<script src="../../js/shop-effects.js"></script>
<script>
  requireAuth(['student']);

  // Получить иконку аватара пользователя из купленных предметов
  function getAvatarIcon(user) {
    if (user.avatarConfig?.photo) return null; // фото — покажем как есть
    var unlocked = user.avatarConfig?.unlockedItems || [];
    if (unlocked.length === 0) return null;
    
    var lastEffect = unlocked[unlocked.length - 1];
    var effectDef = window.AVATAR_EFFECTS || {};
    var icon = effectDef[lastEffect] ? effectDef[lastEffect].icon : null;
    
    if (!icon && window.shopEffects && window.shopEffects.avatarItems) {
      var matched = window.shopEffects.avatarItems.find(function(it) { return it.effect === lastEffect; });
      if (matched && matched.icon) icon = matched.icon;
    }
    
    if (!icon && user.avatarConfig?.lastPurchasedAvatarIcon) {
      icon = user.avatarConfig.lastPurchasedAvatarIcon;
    }
    
    return icon;
  }

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;
    
    // Дожидаемся загрузки shopEffects для корректного отображения аватаров
    if (typeof loadShopEffects === 'function' && (!window.shopEffects || !window.shopEffects.avatarItems)) {
      try { await loadShopEffects(); } catch(e) {}
    }
    
    if (typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }

    const myGroup = await api('/api/admin/my-group');

    if (!myGroup?.students?.length) {
      document.getElementById('podium').innerHTML = '<p style="color:#888;">Вы ещё не в группе</p>';
      return;
    }

    const sorted = [...myGroup.students].sort((a, b) => (b.xp || 0) - (a.xp || 0));
    const myRank = sorted.findIndex(s => (s._id || s) === user._id) + 1;

    // Подиум топ-3
    const podiumOrder = [1, 0, 2]; // серебро, золото, бронза
    const podiumColors = ['#C0C0C0', '#FFD700', '#CD7F32'];
    const podiumHeights = [80, 110, 60];
    const podiumEmojis = ['🥈', '🥇', '🥉'];

    const podiumEl = document.getElementById('podium');
    podiumOrder.forEach((idx, pos) => {
      const s = sorted[idx];
      if (!s) return;
      const isMe = (s._id || s) === user._id;
      var avatarIcon = getAvatarIcon(s);
      var avatarContent = avatarIcon || s.firstName?.charAt(0) || '?';
      podiumEl.innerHTML += `
        <div class="podium-item">
          <div class="podium-avatar" style="font-size:${avatarIcon ? '1.5rem' : '1rem'};width:${pos===1?64:52}px;height:${pos===1?64:52}px;background:${podiumColors[pos]};${isMe?'box-shadow:0 0 0 4px var(--accent);':''}">
            ${avatarContent}
          </div>
          <div style="font-weight:700;font-size:0.9rem;">${isMe ? '👤 Ты' : s.firstName || '?'}</div>
          <div style="color:var(--accent);font-weight:800;font-size:0.85rem;">${s.xp || 0} XP</div>
          <div class="podium-base" style="width:${pos===1?90:70}px;height:${podiumHeights[pos]}px;background:${podiumColors[pos]};">
            ${podiumEmojis[pos]}
          </div>
        </div>`;
    });

    // Полный список
    document.getElementById('fullList').innerHTML = sorted.map((s, i) => {
      const isMe = (s._id || s) === user._id;
      var avatarIcon = getAvatarIcon(s);
      var avatarContent = avatarIcon || s.firstName?.charAt(0) || '?';
      return `
        <div class="leaderboard-item" style="${isMe ? 'background:rgba(153,0,255,0.08);border-radius:12px;padding:8px 12px;' : ''}">
          <div class="lb-rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</div>
          <div class="lb-avatar" style="font-size:${avatarIcon ? '1.2rem' : '0.85rem'};${isMe ? 'background:var(--pink);' : ''}">${avatarContent}</div>
          <div class="lb-name">${isMe ? '<b>👤 Ты</b>' : (s.firstName || '?')}</div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:0.8rem;color:#888;">Ур. ${s.level || 1}</span>
            <span class="lb-xp">${s.xp || 0} XP</span>
            <span style="font-size:0.8rem;color:#888;">🎫 ${s.tickets || 0}</span>
          </div>
        </div>`;
    }).join('');

    // Если ты в топ-3 — конфетти
    if (myRank <= 3) {
      setTimeout(() => launchConfetti(), 500);
    }
  }

  init();
</script>
<script src="../../js/theme-manager.js"></script>
</body>
</html>
