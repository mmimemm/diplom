<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта прогресса — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    .progress-map {
      min-height: 500px;
      background: linear-gradient(135deg, #1a0033, #330066, #0d0d2e);
      border-radius: var(--radius-card);
      position: relative;
      overflow: hidden;
      padding: 40px;
    }
    /* Звёзды на фоне карты */
    .map-bg-star {
      position: absolute;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      pointer-events: none;
    }
    .map-title {
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(153,0,255,0.8);
    }
    /* Путь */
    .map-road {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px 0 100px;
    }
    .map-node {
      position: relative;
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: var(--transition);
      border: 3px solid rgba(255,255,255,0.3);
      z-index: 2;
    }
    .map-node.done { background: var(--accent); border-color: var(--accent-light); box-shadow: 0 0 20px rgba(153,0,255,0.6); }
    .map-node.current { background: var(--pink); border-color: white; animation: pulse 2s infinite; }
    .map-node.locked { background: rgba(255,255,255,0.1); cursor: default; }
    .map-node:hover:not(.locked) { transform: scale(1.2); }
    .map-node .node-label {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 0.7rem;
      white-space: nowrap;
      font-weight: 600;
    }
    /* Линия между узлами */
    .map-connector {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      min-width: 20px;
      max-width: 60px;
    }
    .map-connector.done { background: var(--accent-light); }

    /* Замок */
    .castle-wrap {
      position: absolute;
      bottom: 20px;
      right: 40px;
      text-align: center;
    }
    .castle-wrap img {
      width: 100px;
      transition: filter 1.5s ease, transform 1s ease;
    }
    .castle-wrap img.blurry { filter: blur(8px) grayscale(0.6) brightness(0.7); }
    .castle-wrap img.clear { filter: none; }
    .castle-wrap img.celebrating { transform: scale(1.1); filter: drop-shadow(0 0 20px gold); }
    .castle-label { color: rgba(255,255,255,0.6); font-size: 0.75rem; margin-top: 4px; }

    /* Кот на карте */
    .map-cat-wrap {
      position: absolute;
      bottom: 30px;
      transition: left 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .map-cat-wrap img { width: 50px; }

    /* Легенда */
    .map-legend {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #888; }
    .legend-dot { width: 16px; height: 16px; border-radius: 50%; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="lessons.html"><span class="icon">📚</span> Мои уроки</a>
  <a href="progress-map.html" class="active"><span class="icon">🗺️</span> Карта прогресса</a>
  <a href="submissions.html"><span class="icon">📋</span> Задания</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="sandbox.html"><span class="icon">🧪</span> Песочница</a>
  <a href="shop.html"><span class="icon">🎪</span> Магазин</a>
  <a href="leaderboard.html"><span class="icon">🏆</span> Рейтинг</a>
  <a href="tickets.html"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>

<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>🗺️ Карта прогресса</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <div class="content-card">
    <div class="progress-map" id="progressMap">
      <!-- Фоновые звёздочки -->
      <div id="mapBgStars"></div>
      <div class="map-title">🏰 Путь к Замку Мастерства</div>
      <div class="map-road" id="mapRoad"></div>

      <!-- Замок -->
      <div class="castle-wrap">
        <img src="../../images/castle.png" id="castleImg" class="blurry" alt="Замок Мастерства" onerror="this.textContent='🏰';this.style.fontSize='4rem'">
        <div class="castle-label">Замок Мастерства</div>
      </div>

      <!-- Кот -->
      <div class="map-cat-wrap" id="mapCat" style="left:20px;">
        <img src="../../images/cat.png" alt="Кот" onerror="this.textContent='🐱';this.style.fontSize='2rem'">
      </div>
    </div>

    <!-- Легенда -->
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);"></div> Пройдено</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pink);"></div> Текущий</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(0,0,0,0.1);border:2px solid #ccc;"></div> Заблокировано</div>
    </div>
  </div>

  <!-- Статистика прогресса -->
  <div class="stats-grid" style="margin-top:20px;">
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-info"><h3 id="doneCount">0</h3><p>Пройдено уроков</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📚</div>
      <div class="stat-info"><h3 id="totalCount">0</h3><p>Всего уроков</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <div class="stat-info"><h3 id="pctCount">0%</h3><p>Прогресс курса</p></div>
    </div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['student']);

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;
    if (typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }

    // Фоновые звёздочки на карте
    const starsContainer = document.getElementById('mapBgStars');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'map-bg-star';
      s.textContent = ['✦', '·', '★', '✧'][Math.floor(Math.random() * 4)];
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      starsContainer.appendChild(s);
    }

    // Загружаем уроки и прогресс
    const courses = await api('/api/courses');
    if (!courses?.length) return;

    const modules = await api(`/api/courses/${courses[0]._id}/modules`);
    const progress = await api(`/api/progress/${user._id}`);
    const doneIds = new Set(progress?.map(p => p.lessonId?._id || p.lessonId) || []);

    // Собираем все уроки
    let allLessons = [];
    for (const mod of (modules || [])) {
      const lessons = await api(`/api/modules/${mod._id}/lessons`);
      allLessons = allLessons.concat(lessons || []);
    }

    const total = allLessons.length;
    const done = allLessons.filter(l => doneIds.has(l._id)).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    document.getElementById('doneCount').textContent = done;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('pctCount').textContent = pct + '%';

    // Строим карту
    const road = document.getElementById('mapRoad');
    road.innerHTML = '';

    allLessons.forEach((lesson, i) => {
      const isDone = doneIds.has(lesson._id);
      const isCurrent = !isDone && (i === 0 || doneIds.has(allLessons[i - 1]?._id));

      const node = document.createElement('div');
      node.className = `map-node ${isDone ? 'done' : isCurrent ? 'current' : 'locked'}`;
      node.innerHTML = `${isDone ? '✓' : isCurrent ? '▶' : '🔒'}<div class="node-label">${lesson.title.substring(0, 8)}...</div>`;
      if (!isDone && !isCurrent) node.title = 'Сначала пройди предыдущие уроки';
      else node.onclick = () => location.href = `lessons.html`;
      road.appendChild(node);

      // Коннектор между узлами
      if (i < allLessons.length - 1) {
        const conn = document.createElement('div');
        conn.className = `map-connector ${isDone ? 'done' : ''}`;
        road.appendChild(conn);
      }
    });

    // Позиция кота
    const catEl = document.getElementById('mapCat');
    const mapWidth = document.getElementById('progressMap').offsetWidth - 160;
    const catPos = total > 0 ? (done / total) * mapWidth : 20;
    catEl.style.left = Math.max(20, catPos) + 'px';

    // Замок — чёткость зависит от прогресса
    const castle = document.getElementById('castleImg');
    if (pct >= 100) {
      castle.classList.remove('blurry');
      castle.classList.add('clear', 'celebrating');
      launchConfetti();
      showToast('🏰 Ты достиг Замка Мастерства! Поздравляем!');
    } else if (pct >= 50) {
      castle.style.filter = `blur(${4 - pct / 25}px) grayscale(${0.5 - pct / 200})`;
    }
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
