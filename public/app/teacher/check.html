<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Проверка заданий — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    .sub-card { background:var(--bg); border-radius:20px; padding:20px; margin-bottom:14px; transition:0.3s; }
    .sub-card:hover { box-shadow: var(--shadow-card); }
    .code-view { background:#1e1e1e; border-radius:12px; padding:14px 16px; color:#d4d4d4; font-family:monospace; font-size:0.85rem; max-height:200px; overflow-y:auto; white-space:pre; margin:10px 0; }
    .score-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .score-input { width:80px; border:2px solid var(--accent); border-radius:20px; padding:6px 12px; font-family:inherit; font-weight:700; text-align:center; outline:none; font-size:1rem; }
    .comment-input { flex:1; border:2px solid #eee; border-radius:20px; padding:8px 16px; font-family:inherit; outline:none; min-width:150px; }
    @media(max-width:768px) { .score-row { flex-direction:column; } .score-input, .comment-input { width:100% !important; } }
    @media(max-width:480px) { .sub-card { padding:14px; } }
  </style>
</head>
<body>
<div class="page-loader"></div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=3" alt="IT-MANIA" onerror="this.onerror=null; this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html" ><span class="icon">🏠</span> Главная</a>
  <a href="check.html" class="active"><span class="icon">✅</span> Проверка заданий</a>
  <a href="lessons-editor.html"><span class="icon">✏️</span> Конструктор уроков</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="group.html"><span class="icon">👥</span> Моя группа</a>
  <a href="parents.html" ><span class="icon">👨‍👩‍👧‍👦</span> Родители</a>
    <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1 class="greeting-text">✅ Проверка заданий</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn" onclick="openNotifPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <div class="stats-grid" style="margin-bottom:16px;">
    <div class="stat-card stat-anim"><div class="stat-icon">⏳</div><div class="stat-info"><h3 id="pendingCount">0</h3><p>На проверке</p></div></div>
    <div class="stat-card stat-anim"><div class="stat-icon">✅</div><div class="stat-info"><h3 id="checkedToday">0</h3><p>Проверено сегодня</p></div></div>
  </div>

  <div class="content-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <h2 style="margin:0;">Задания на проверке</h2>
      <button onclick="loadSubmissions()" style="background:var(--bg);border:none;border-radius:20px;padding:8px 16px;font-weight:700;cursor:pointer;font-family:inherit;">🔄 Обновить</button>
    </div>
    <div id="subsList"><p style="color:#888;text-align:center;padding:30px;">Загрузка...</p></div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/cat.png" alt="Кот">
</div>

<!-- Панель уведомлений -->
<div id="notifPanel" style="display:none;">
  <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
    <b>Уведомления</b>
    <button onclick="document.getElementById('notifPanel').style.display='none'" style="background:none;border:none;cursor:pointer;">✕</button>
  </div>
  <div id="notifList"></div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/app-enhancements.js"></script>
<script>
  requireAuth(['teacher', 'admin']);

  async function init() {
    const user = await api('/api/auth/me');
    if (user && typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else if (user) {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }
    loadSubmissions();
  }

  async function loadSubmissions() {
    try {
      const subs = await api('/api/submissions/pending') || [];
      document.getElementById('pendingCount').textContent = subs.length;

      if (!subs.length) {
        document.getElementById('subsList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎉</div>
            <div class="empty-state-title">Все задания проверены!</div>
            <div class="empty-state-desc">Новые задания появятся здесь автоматически</div>
          </div>`;
        return;
      }

      document.getElementById('subsList').innerHTML = subs.map(s => `
        <div class="sub-card" id="sub_${s._id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div>
              <div style="font-weight:800;font-size:1rem;">👤 ${s.studentId?.firstName||''} ${s.studentId?.lastName||''}</div>
              <div style="color:#888;font-size:0.85rem;">📚 ${s.lessonId?.title||'Урок'} · Попытка ${s.attempt}</div>
              <div style="color:#aaa;font-size:0.75rem;">${new Date(s.submittedAt).toLocaleString('ru')}</div>
            </div>
            <span class="badge badge-new">Новое</span>
          </div>
          <div class="code-view">${escapeHtml(s.code || '(код не прикреплён)')}</div>
          
          ${s.comments?.length ? `
            <div style="background:rgba(255,105,180,0.1);border-radius:12px;padding:12px 16px;margin:10px 0;">
              <div style="font-weight:700;color:var(--pink);margin-bottom:6px;">💬 Вопросы ученика:</div>
              ${s.comments.map(c => `
                <div style="background:white;border-radius:10px;padding:8px 12px;margin-bottom:6px;">
                  <div style="font-size:0.85rem;">${c.text}</div>
                  ${c.line ? `<div style="color:#888;font-size:0.75rem;margin-top:2px;">Строка ${c.line}</div>` : ''}
                </div>`).join('')}
            </div>
          ` : ''}
          
          <div class="score-row">
            <label style="font-weight:700;font-size:0.9rem;">Оценка:</label>
            <input class="score-input" type="number" min="0" max="100" id="score_${s._id}" placeholder="85">
            <input class="comment-input" type="text" id="comment_${s._id}" placeholder="Ответ на вопросы ученика...">
            <button onclick="checkSub('${s._id}')"
              style="background:var(--accent);color:white;border:none;border-radius:20px;padding:8px 20px;font-weight:700;cursor:pointer;font-family:inherit;">
              ✅ Проверить
            </button>
          </div>
        </div>`).join('');
    } catch (error) {
      console.error('Ошибка загрузки заданий:', error);
      document.getElementById('subsList').innerHTML = `<p style="color:red;text-align:center;">Ошибка загрузки заданий: ${error.message}</p>`;
    }
  }

  async function checkSub(id) {
    const score = parseInt(document.getElementById(`score_${id}`).value);
    const comment = document.getElementById(`comment_${id}`).value;
    if (isNaN(score) || score < 0 || score > 100) { showToast('Введите оценку 0–100', 'error'); playSound('error'); return; }

    const res = await api(`/api/submissions/${id}/check`, {
      method: 'PATCH',
      body: JSON.stringify({ score, teacherComment: comment })
    });
    if (res) {
      const card = document.getElementById(`sub_${id}`);
      card.style.transition = '0.4s';
      card.style.opacity = '0';
      card.style.transform = 'translateX(40px)';
      setTimeout(() => { card.remove(); loadSubmissions(); }, 400);
      showToast(`Проверено! ${score}% · 🎫 ${res.tickets} билетиков`);
      playSound('success');
      spawnStars(8);
      if (typeof confetti !== 'undefined') confetti({ particleCount: 40, spread: 60, origin: { y: 0.5 } });
      const today = parseInt(document.getElementById('checkedToday').textContent) + 1;
      document.getElementById('checkedToday').textContent = today;
    }
  }

  async function openNotifPanel() {
    const panel = document.getElementById('notifPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    playSound('open');
    if (panel.style.display === 'block') {
      const notes = await loadNotifications();
      document.getElementById('notifList').innerHTML = notes?.length
        ? notes.map(n => `<div style="padding:8px 0;border-bottom:1px solid #f0e8ff;font-size:0.85rem;"><b>${n.text}</b><div style="color:#aaa;font-size:0.75rem;">${new Date(n.createdAt).toLocaleDateString('ru')}</div></div>`).join('')
        : '<p style="color:#888;text-align:center;">Нет уведомлений</p>';
      await api('/api/notifications/read', { method: 'PATCH' });
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
