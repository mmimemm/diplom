<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моя группа — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=3" alt="IT-MANIA" onerror="this.onerror=null; this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="check.html"><span class="icon">✅</span> Проверка заданий</a>
  <a href="lessons-editor.html"><span class="icon">✏️</span> Конструктор уроков</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="group.html" class="active"><span class="icon">👥</span> Моя группа</a>
  <a href="parents.html" ><span class="icon">👨‍👩‍👧‍👦</span> Родители</a>
    <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>👥 Моя группа</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn" onclick="toggleNotificationsPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <!-- Расписание группы -->
  <div class="content-card" id="scheduleCard" style="margin-bottom:20px;">
    <h2>📅 Расписание группы</h2>
    <div id="scheduleList"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
  </div>

  <div class="stats-grid" id="groupStats"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <!-- Список учеников -->
    <div class="content-card">
      <h2>Ученики</h2>
      <div id="studentsList"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
    </div>
    <!-- Прогресс группы -->
    <div class="content-card">
      <h2>Прогресс группы (XP)</h2>
      <canvas id="groupChart" height="250"></canvas>
    </div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['teacher']);

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;
    if (typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }

    const groups = await api('/api/admin/groups') || [];
    const myGroup = groups.find(g =>
      (g.teacherId?._id || g.teacherId)?.toString() === user._id?.toString()
    );

    // Загрузка расписания
    if (myGroup?.schedule?.length) {
      const scheduleHTML = myGroup.schedule.map(s => `
        <div class="schedule-item">
          <span class="schedule-day">${s.day}</span>
          <span class="schedule-time">${s.time}</span>
          <span class="schedule-room">${s.room || 'Кабинет не указан'}</span>
        </div>
      `).join('');
      document.getElementById('scheduleList').innerHTML = '<div class="schedule-grid">' + scheduleHTML + '</div>';
    } else {
      document.getElementById('scheduleList').innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Расписание пока не назначено</p>';
    }

    if (!myGroup) {
      document.getElementById('studentsList').innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Группа не назначена</p>';
      return;
    }

    const students = myGroup.students || [];

    document.getElementById('groupStats').innerHTML = `
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-info"><h3>${students.length}</h3><p>Учеников</p></div></div>
      <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-info"><h3>${students.reduce((s,st)=>s+(st.xp||0),0)}</h3><p>Суммарный XP</p></div></div>
      <div class="stat-card"><div class="stat-icon">🏅</div><div class="stat-info"><h3>${students.length ? Math.round(students.reduce((s,st)=>s+(st.xp||0),0)/students.length) : 0}</h3><p>Средний XP</p></div></div>
    `;

    if (!students.length) {
      document.getElementById('studentsList').innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Учеников пока нет</p>';
      return;
    }

    // Сортируем по XP
    const sorted = [...students].sort((a, b) => (b.xp || 0) - (a.xp || 0));

    document.getElementById('studentsList').innerHTML = sorted.map((s, i) => `
      <div class="leaderboard-item">
        <div class="lb-rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</div>
        <div class="lb-avatar">${s.firstName?.charAt(0) || '?'}</div>
        <div class="lb-name">${s.firstName || ''} ${s.lastName || ''}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
          <div class="lb-xp">${s.xp || 0} XP</div>
          <div style="font-size:0.75rem;color:#888;">Ур. ${s.level || 1}</div>
        </div>
      </div>
    `).join('');

    // График
    new Chart(document.getElementById('groupChart'), {
      type: 'bar',
      data: {
        labels: sorted.map(s => s.firstName || '?'),
        datasets: [{ label: 'XP', data: sorted.map(s => s.xp || 0),
          backgroundColor: sorted.map((_, i) => i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : 'rgba(153,0,255,0.6)'),
          borderRadius: 8 }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, grid: { color: '#f0e8ff' } }, x: { grid: { display: false } } }
      }
    });
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
