<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Чаты — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .chat-layout { display:flex;gap:20px;min-height:calc(100vh - 240px);max-height:calc(100vh - 200px);overflow:hidden; }
    .chat-sidebar { width:280px;flex-shrink:0;overflow:hidden; }
    .chat-main { flex:1;display:flex;flex-direction:column;min-width:0; }
    .chat-tabs { display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap; }
    .chat-tab { padding:8px 18px;border-radius:30px;border:2px solid var(--accent);background:none;color:var(--accent);font-weight:700;cursor:pointer;font-family:inherit;transition:0.3s;font-size:0.85rem; }
    .chat-tab.active { background:var(--accent);color:white; }
    .chat-tab:hover { background:rgba(153,0,255,0.08); }
    .contact-item { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;cursor:pointer;transition:0.3s;margin-bottom:6px;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .contact-item:hover { transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,0.1); }
    .contact-item:active { transform:translateX(4px) scale(0.98); }
    .contact-item.active { background:var(--accent);color:white; }
    .contact-avatar { width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;flex-shrink:0; }
    .contact-item.active .contact-avatar { background:rgba(255,255,255,0.2); }
    .contact-info { flex:1;min-width:0; }
    .contact-name { font-weight:700;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .contact-sub { font-size:0.75rem;color:#888; }
    .contact-item.active .contact-sub { color:rgba(255,255,255,0.7); }
    .unread-dot { width:8px;height:8px;border-radius:50%;background:#FF69B4;flex-shrink:0; }
    .messages-area { flex:1;background:white;border-radius:16px;padding:16px;overflow-y:auto;max-height:calc(100vh - 420px);display:flex;flex-direction:column;gap:8px; }
    .msg { max-width:80%;padding:10px 16px;border-radius:18px;font-size:0.9rem;line-height:1.4;animation:fadeInUp 0.3s ease both; }
    .msg.mine { align-self:flex-end;background:var(--accent);color:white;border-bottom-right-radius:4px; }
    .msg.theirs { align-self:flex-start;background:var(--bg);color:var(--text-dark);border-bottom-left-radius:4px; }
    .msg-time { font-size:0.65rem;opacity:0.6;margin-top:4px;text-align:right; }
    .msg-input-area { display:flex;gap:10px;margin-top:12px; }
    .msg-input { flex:1;border:2px solid #eee;border-radius:24px;padding:12px 18px;font-family:inherit;outline:none;font-size:0.9rem;transition:0.3s; }
    .msg-input:focus { border-color:var(--accent); }
    .empty-chat { text-align:center;padding:60px 20px;color:#888;animation:fadeInUp 0.5s ease both; }
    .empty-chat .icon { font-size:4rem;margin-bottom:12px;animation:float 3s ease-in-out infinite; }
    .student-actions { display:flex;gap:6px;flex-wrap:wrap;margin-top:8px; }
    .achievement-btn { background:linear-gradient(135deg,#FFD700,#FFA500);border:none;color:white;border-radius:20px;padding:6px 14px;font-weight:700;font-size:0.8rem;cursor:pointer;font-family:inherit;transition:0.3s; }
    .achievement-btn:hover { transform:scale(1.05); }
    .achievement-btn:active { transform:scale(0.95); }
    .contact-badge { display:inline-block;background:#FFD700;border-radius:10px;padding:2px 8px;font-size:0.7rem;font-weight:700;margin-left:6px; }
    .search-contacts { width:100%;border:2px solid #eee;border-radius:20px;padding:8px 14px;font-family:inherit;outline:none;margin-bottom:12px;font-size:0.85rem;transition:0.3s; }
    .search-contacts:focus { border-color:var(--accent); }
    @media(max-width:992px) { .chat-layout { flex-direction:column; } .chat-sidebar { width:100%; } .messages-area { max-height:400px; } .chat-tabs { justify-content:center; } }
    @media(max-width:768px) { .chat-layout { min-height:auto;max-height:none; } .msg { max-width:90%; } }
    @media(max-width:480px) { .msg-input-area { flex-direction:column; } .msg-input-area button { width:100%; } .chat-tab { padding:6px 12px;font-size:0.78rem; } }
  </style>
</head>
<body>
<div class="page-loader"></div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=3" alt="IT-MANIA" onerror="this.onerror=null; this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="check.html"><span class="icon">✅</span> Проверка заданий</a>
  <a href="lessons-editor.html"><span class="icon">✏️</span> Конструктор уроков</a>
  <a href="chat.html" class="active"><span class="icon">💬</span> Чаты</a>
  <a href="group.html"><span class="icon">👥</span> Моя группа</a>
  <a href="parents.html" ><span class="icon">👨‍👩‍👧‍👦</span> Родители</a>
    <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1 class="greeting-text">💬 Чаты</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn" onclick="toggleNotificationsPanel()">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <div class="chat-tabs">
    <button class="chat-tab active" onclick="switchChatTab('group',this)">👥 Групповой чат</button>
    <button class="chat-tab" onclick="switchChatTab('students',this)">🎓 Ученики</button>
    <button class="chat-tab" onclick="switchChatTab('parents',this)">👨‍👩‍👧‍👦 Родители</button>
    <button class="chat-tab" onclick="switchChatTab('admin',this)">⚙️ Администратор</button>
  </div>

  <div class="chat-layout">
    <!-- Боковая панель контактов -->
    <div class="chat-sidebar">
      <div class="content-card" style="padding:16px;">
        <input class="search-contacts" type="text" id="contactSearch" placeholder="🔍 Поиск..." oninput="filterContacts()">
        <div id="contactsList" style="max-height:500px;overflow-y:auto;">Загрузка...</div>
      </div>
    </div>

    <!-- Основная область чата -->
    <div class="chat-main">
      <div class="content-card" style="flex:1;display:flex;flex-direction:column;padding:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
          <h2 id="chatHeader" style="margin:0;">💬 Выберите чат</h2>
          <div id="studentActions" style="display:none;"></div>
        </div>

        <!-- Групповой чат -->
        <div id="groupChatArea" style="display:flex;flex-direction:column;flex:1;">
          <div class="messages-area" id="groupMessages"></div>
          <div class="msg-input-area">
            <input class="msg-input" id="groupMsgInput" type="text" placeholder="Напишите сообщение группе..." onkeydown="if(event.key==='Enter')sendGroupMessage()">
            <button onclick="sendGroupMessage()" style="background:var(--accent);color:white;border:none;border-radius:24px;padding:12px 24px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:0.2s;">➤</button>
          </div>
        </div>

        <!-- Личный чат -->
        <div id="personalChatArea" style="display:none;flex-direction:column;flex:1;">
          <div class="messages-area" id="personalMessages"></div>
          <div class="msg-input-area">
            <input class="msg-input" id="personalMsgInput" type="text" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter')sendPersonalMessage()">
            <button onclick="sendPersonalMessage()" style="background:var(--accent);color:white;border:none;border-radius:24px;padding:12px 24px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:0.2s;">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/cat.png" alt="Кот">
</div>

<script src="../../js/app.js"></script>
<script src="../../js/app-enhancements.js"></script>
<script>
  requireAuth(['teacher']);

  let currentTab = 'group';
  let currentContactId = null;
  let currentContactName = '';
  let currentContactType = '';
  let groupId = null;
  let chatPollInterval = null;
  let myUserId = null;

  const ACHIEVEMENTS = [
    { name: 'Отличный код!', icon: '⭐' },
    { name: 'Скорость мысли', icon: '⚡' },
    { name: 'Креативный подход', icon: '🎨' },
    { name: 'Помощь другим', icon: '🤝' },
    { name: '100% на тесте', icon: '🏆' },
    { name: 'Лидер группы', icon: '👑' },
    { name: 'Без ошибок', icon: '💎' },
    { name: 'Супер-программист', icon: '🚀' },
    { name: 'Настойчивость', icon: '💪' },
    { name: 'Гениальное решение', icon: '🧠' },
  ];

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;
    myUserId = user._id;
    if (typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }

    const groups = await api('/api/admin/groups') || [];
    const myGroup = groups.find(g => (g.teacherId?._id || g.teacherId)?.toString() === user._id?.toString());
    if (myGroup) {
      groupId = myGroup._id;
    }

    document.getElementById('groupChatArea').style.display = 'flex';
    document.getElementById('personalChatArea').style.display = 'none';
    
    await showGroupChat();
    
    chatPollInterval = setInterval(() => {
      if (currentTab === 'group') loadGroupMessages();
      else if (currentContactId) loadPersonalMessages();
    }, 5000);
  }

  async function switchChatTab(tab, btn) {
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentTab = tab;
    playSound('swipe');

    document.getElementById('chatHeader').textContent = 
      tab === 'group' ? '💬 Групповой чат' : 
      tab === 'students' ? '🎓 Личные чаты с учениками' :
      tab === 'parents' ? '👨‍👩‍👧‍👦 Чаты с родителями' : '⚙️ Чат с администрацией';

    currentContactId = null;
    currentContactName = '';
    document.getElementById('groupChatArea').style.display = tab === 'group' ? 'flex' : 'none';
    document.getElementById('personalChatArea').style.display = tab !== 'group' && currentContactId ? 'flex' : 'none';
    document.getElementById('studentActions').style.display = 'none';
    document.getElementById('personalMessages').innerHTML = '';
    document.getElementById('personalMsgInput').value = '';

    if (tab === 'group') {
      await showGroupChat();
    } else {
      await loadContacts();
    }
  }

  async function showGroupChat() {
    document.getElementById('contactsList').innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Групповой чат активен</p>';
    if (!groupId) {
      document.getElementById('groupMessages').innerHTML = '<div class="empty-chat"><div class="icon">👥</div><p>У вас пока нет группы</p></div>';
      return;
    }
    await loadGroupMessages();
  }

  async function loadGroupMessages() {
    if (!groupId) return;
    const messages = await api(`/api/group-chat/${groupId}`) || [];
    renderGroupMessages(messages);
  }

  function renderGroupMessages(messages) {
    const container = document.getElementById('groupMessages');
    if (!messages.length) {
      container.innerHTML = '<div class="empty-chat"><div class="icon">👥</div><p>Пока нет сообщений в групповом чате</p><p style="font-size:0.85rem;color:#aaa;">Напишите первое сообщение!</p></div>';
      return;
    }
    container.innerHTML = messages.map(m => {
      const isMine = m.userId === getUserId();
      return `
        <div class="msg ${isMine ? 'mine' : 'theirs'}">
          ${!isMine ? `<div style="font-weight:700;font-size:0.75rem;margin-bottom:2px;opacity:0.7;">${m.userName || 'Ученик'}${m.userRole === 'teacher' ? ' 👨‍🏫' : ''}</div>` : ''}
          <div>${escHtml(m.text)}</div>
          <div class="msg-time">${new Date(m.createdAt).toLocaleString('ru', {hour:'2-digit',minute:'2-digit'})}</div>
        </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  async function sendGroupMessage() {
    const input = document.getElementById('groupMsgInput');
    const text = input.value.trim();
    if (!text || !groupId) return;
    input.value = '';
    await api(`/api/group-chat/${groupId}`, {
      method: 'POST',
      body: JSON.stringify({ text })
    });
    playSound('ding');
    await loadGroupMessages();
  }

  async function loadContacts() {
    const container = document.getElementById('contactsList');
    container.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Загрузка...</p>';

    let contacts = [];
    if (currentTab === 'students') {
      contacts = await loadStudentContacts();
    } else if (currentTab === 'parents') {
      contacts = await loadParentContacts();
    } else if (currentTab === 'admin') {
      contacts = await loadAdminContacts();
    }

    if (!contacts.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon" style="font-size:2.5rem;">📭</div><div class="empty-state-desc">${currentTab === 'students' ? 'Нет учеников в группе' : currentTab === 'parents' ? 'Нет родителей' : 'Нет администраторов'}</div></div>`;
      return;
    }

    window._contacts = contacts;
    renderContacts(contacts);
  }

  async function loadStudentContacts() {
    const groups = await api('/api/admin/groups') || [];
    const user = await api('/api/auth/me');
    const myGroup = groups.find(g => (g.teacherId?._id || g.teacherId)?.toString() === user?._id?.toString());
    if (!myGroup) return [];
    return (myGroup.students || []).map(s => ({
      _id: s._id,
      name: `${s.firstName || ''} ${s.lastName || ''}`.trim() || 'Ученик',
      sub: `${s.xp || 0} XP · Ур.${s.level || 1}`,
      type: 'student',
      avatar: s.firstName?.charAt(0) || '?',
      badges: s.badges || []
    }));
  }

  async function loadParentContacts() {
    const parents = await api('/api/teacher/parents') || [];
    return parents.map(p => ({
      _id: p._id,
      name: `${p.firstName || ''} ${p.lastName || ''}`.trim() || 'Родитель',
      sub: (p.children || []).map(c => `${c.firstName} (${c.xp} XP)`).join(', '),
      type: 'parent',
      avatar: p.firstName?.charAt(0) || '?',
      children: p.children || []
    }));
  }

  async function loadAdminContacts() {
    const admins = await api('/api/admins') || [];
    return admins.map(a => ({
      _id: a._id,
      name: `${a.firstName || ''} ${a.lastName || ''}`.trim() || 'Администратор',
      sub: a.email || 'Администратор',
      type: 'admin',
      avatar: a.firstName?.charAt(0) || 'A'
    }));
  }

  function renderContacts(contacts) {
    const container = document.getElementById('contactsList');
    container.innerHTML = contacts.map(c => `
      <div class="contact-item ${currentContactId === c._id ? 'active' : ''}" onclick="openPersonalChat('${c._id}','${escHtml(c.name)}','${c.type}')" data-id="${c._id}" data-name="${escHtml(c.name)}" data-search="${escHtml(c.name+' '+c.sub).toLowerCase()}">
        <div class="contact-avatar">${c.avatar}</div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-sub">${c.sub}</div>
        </div>
      </div>
    `).join('');
  }

  function filterContacts() {
    const q = document.getElementById('contactSearch').value.toLowerCase().trim();
    document.querySelectorAll('.contact-item').forEach(el => {
      const search = (el.dataset.search || '').toLowerCase();
      el.style.display = q && !search.includes(q) ? 'none' : 'flex';
    });
  }

  async function openPersonalChat(contactId, name, type) {
    currentContactId = contactId;
    currentContactName = name;
    currentContactType = type;
    document.getElementById('chatHeader').textContent = `💬 ${name}`;
    document.getElementById('groupChatArea').style.display = 'none';
    document.getElementById('personalChatArea').style.display = 'flex';
    playSound('open');

    document.querySelectorAll('.contact-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === contactId);
    });

    const actionsDiv = document.getElementById('studentActions');
    if (type === 'student') {
      actionsDiv.style.display = 'flex';
      actionsDiv.innerHTML = `
        <button onclick="showAchievementDialog('${contactId}','${escHtml(name)}')" class="achievement-btn">🏆 Выдать достижение</button>
      `;
    } else {
      actionsDiv.style.display = 'none';
      actionsDiv.innerHTML = '';
    }

    await loadPersonalMessages();
  }

  async function loadPersonalMessages() {
    if (!currentContactId) return;
    let messages = [];
    
    if (currentContactType === 'student') {
      messages = await api(`/api/chat/student/${currentContactId}`) || [];
    } else if (currentContactType === 'parent') {
      messages = await api(`/api/teacher/parent-chat/${currentContactId}`) || [];
    } else if (currentContactType === 'admin') {
      messages = await api(`/api/chat-admin/${currentContactId}`) || [];
    }

    renderPersonalMessages(messages);
  }

  function renderPersonalMessages(messages) {
    const container = document.getElementById('personalMessages');
    if (!messages.length) {
      container.innerHTML = `<div class="empty-chat"><div class="icon">💬</div><p>Начните общение с ${currentContactName}</p></div>`;
      return;
    }
    container.innerHTML = messages.map(m => {
      let isMine;
      if (currentContactType === 'admin') {
        isMine = String(m.studentId) === String(myUserId);
      } else {
        isMine = m.from === 'teacher';
      }
      return `
        <div class="msg ${isMine ? 'mine' : 'theirs'}">
          <div>${escHtml(m.text)}</div>
          <div class="msg-time">${new Date(m.createdAt).toLocaleString('ru', {hour:'2-digit',minute:'2-digit'})}</div>
        </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  async function sendPersonalMessage() {
    const input = document.getElementById('personalMsgInput');
    const text = input.value.trim();
    if (!text || !currentContactId) return;
    input.value = '';

    let res;
    if (currentContactType === 'student') {
      res = await api(`/api/chat/student/${currentContactId}`, {
        method: 'POST', body: JSON.stringify({ text })
      });
    } else if (currentContactType === 'parent') {
      res = await api(`/api/teacher/parent-chat/${currentContactId}`, {
        method: 'POST', body: JSON.stringify({ text })
      });
    } else if (currentContactType === 'admin') {
      res = await api(`/api/chat-admin/${currentContactId}`, {
        method: 'POST', body: JSON.stringify({ text })
      });
    }

    if (res) {
      playSound('ding');
      await loadPersonalMessages();
    }
  }

  function showAchievementDialog(studentId, studentName) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML = `
      <div style="background:var(--card-bg);border-radius:24px;padding:30px;width:460px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,0.2);color:var(--text-dark);">
        <h2 style="margin:0 0 6px;">🏆 Выдать достижение</h2>
        <p style="color:#888;margin:0 0 20px;">Ученик: <b>${studentName}</b></p>
        <label style="font-weight:700;font-size:0.9rem;display:block;margin-bottom:6px;">Название достижения</label>
        <input id="customAchievement" type="text" placeholder="Своё достижение..." 
          style="width:100%;border:2px solid var(--input-border);border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;margin-bottom:16px;background:var(--input-bg);color:var(--text-dark);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;">
          ${ACHIEVEMENTS.map(a => `
            <button onclick="selectAchievement(this,'${a.name}','${a.icon}')" 
              style="display:flex;align-items:center;gap:8px;padding:8px 12px;border:2px solid #eee;border-radius:14px;background:white;cursor:pointer;font-family:inherit;font-size:0.85rem;font-weight:600;transition:0.3s;text-align:left;"
              onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='#eee'">
              <span style="font-size:1.2rem;">${a.icon}</span> ${a.name}
            </button>
          `).join('')}
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
          <button onclick="this.closest('div[style]').parentElement.remove()"
            style="background:var(--bg);border:none;border-radius:20px;padding:10px 24px;font-weight:700;cursor:pointer;font-family:inherit;">Отмена</button>
          <button onclick="giveAchievement('${studentId}')"
            style="background:linear-gradient(135deg,#FFD700,#FFA500);color:white;border:none;border-radius:20px;padding:10px 24px;font-weight:700;cursor:pointer;font-family:inherit;">🎁 Выдать +100 XP</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    playSound('open');
    window._achievementOverlay = overlay;
    window._selectedAchievement = null;
  }

  function selectAchievement(btn, name, icon) {
    document.querySelectorAll('#customAchievement ~ div button').forEach(b => {
      b.style.borderColor = '#eee';
      b.style.background = 'white';
    });
    btn.style.borderColor = '#FFD700';
    btn.style.background = '#FFF8DC';
    document.getElementById('customAchievement').value = name;
    window._selectedAchievement = { name, icon };
  }

  async function giveAchievement(studentId) {
    const customInput = document.getElementById('customAchievement');
    const name = customInput.value.trim();
    if (!name) { showToast('Выберите или введите название достижения', 'error'); playSound('error'); return; }

    const res = await api('/api/teacher/achievement', {
      method: 'POST',
      body: JSON.stringify({ studentId, name, icon: '🏆' })
    });

    if (res) {
      showToast(`🏆 Достижение "${name}" выдано! +100 XP`);
      playSound('achievement');
      spawnStars(20);
      if (typeof confetti !== 'undefined') confetti({ particleCount: 80, spread: 60 });
      window._achievementOverlay?.remove();
    }
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
