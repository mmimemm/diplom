<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обращения — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .ticket-card {
      background: var(--bg);
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 10px;
      animation: ticketCardIn 0.4s ease both;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .ticket-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(153,0,255,0.12);
    }
    .ticket-card:nth-child(1) { animation-delay: 0s; }
    .ticket-card:nth-child(2) { animation-delay: 0.08s; }
    .ticket-card:nth-child(3) { animation-delay: 0.16s; }
    .ticket-card:nth-child(4) { animation-delay: 0.24s; }
    .ticket-card:nth-child(5) { animation-delay: 0.32s; }
    @keyframes ticketCardIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ticket-reply {
      background: var(--accent);
      color: white;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.85rem;
      margin-bottom: 4px;
      animation: fadeInUp 0.3s ease both;
    }

    @media(max-width: 480px) {
      .ticket-form-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .ticket-form-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="progress.html"><span class="icon">📊</span> Успеваемость</a>
  <a href="payments.html"><span class="icon">💳</span> Оплата</a>
  <a href="chat.html"><span class="icon">💬</span> Чаты</a>
  <a href="tickets.html" class="active"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle">☰</button>
    <h1>🎫 Мои обращения</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <div class="content-card">
    <h2>✉️ Новое обращение</h2>
    <input id="tSubject" type="text" placeholder="Тема обращения"
      style="width:100%;border:2px solid var(--input-border);border-radius:20px;padding:10px 16px;font-family:inherit;outline:none;margin-bottom:10px;
             background:var(--input-bg);color:var(--text-dark);">
    <textarea id="tMessage" placeholder="Опишите вашу проблему или вопрос..." rows="4"
      style="width:100%;border:2px solid var(--input-border);border-radius:20px;padding:12px 16px;font-family:inherit;outline:none;resize:none;
             background:var(--input-bg);color:var(--text-dark);"></textarea>
    <div class="ticket-form-actions">
      <button onclick="createTicket()" class="btn-accent" style="border-radius:20px;padding:10px 28px;">
        Отправить обращение
      </button>
    </div>
  </div>

  <div class="content-card">
    <h2>Мои обращения</h2>
    <div id="myTickets"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['parent', 'student', 'teacher']);

  function playSound(name) {
    if (typeof window.playSound === 'function') window.playSound(name);
  }

  async function init() {
    const user = await api('/api/auth/me');
    if (user && typeof updateTopbarAvatar === 'function') {
      await updateTopbarAvatar(user);
    } else if (user) {
      document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';
    }
    loadTickets();
  }

  async function loadTickets() {
    const tickets = await api('/api/tickets') || [];
    const el = document.getElementById('myTickets');
    const statusLabel = { open: '🔴 Открыт', in_progress: '🟡 В работе', closed: '🟢 Закрыт' };
    const statusClass = { open: 'badge-danger', in_progress: 'badge-warn', closed: 'badge-success' };
    if (!tickets.length) { el.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Обращений пока нет</p>'; return; }
    el.innerHTML = tickets.map(t => `
      <div class="ticket-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px;">
          <span style="font-weight:700;">${t.subject || 'Без темы'}</span>
          <span class="badge ${statusClass[t.status] || 'badge-new'}">${statusLabel[t.status] || t.status}</span>
        </div>
        <p style="font-size:0.9rem;color:#555;margin-bottom:6px;">${t.message || ''}</p>
        ${t.replies?.length ? `
          <div style="border-top:1px solid rgba(153,0,255,0.1);margin-top:8px;padding-top:8px;">
            ${t.replies.map(r => `<div class="ticket-reply">${r.text}</div>`).join('')}
          </div>` : ''}
        <div style="font-size:0.75rem;color:#aaa;margin-top:6px;">${new Date(t.createdAt).toLocaleString('ru')}</div>
      </div>`).join('');
  }

  async function createTicket() {
    const subject = document.getElementById('tSubject').value.trim();
    const message = document.getElementById('tMessage').value.trim();
    if (!message) { showToast('Напишите сообщение', 'error'); return; }
    playSound('success');
    const res = await api('/api/tickets', { method: 'POST', body: JSON.stringify({ subject, message }) });
    if (res) {
      showToast('Обращение отправлено! ✅');
      playSound('success');
      document.getElementById('tSubject').value = '';
      document.getElementById('tMessage').value = '';
      loadTickets();
    }
  }

  init();
</script>
  <script src="../../js/theme-manager.js"></script>
</body>
</html>
