<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата — IT-MANIA</title>
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    .price-card {
      background: white; border-radius: 20px; padding: 28px 24px; text-align: center;
      border: 3px solid transparent; cursor: pointer; transition: 0.3s;
    }
    .price-card:hover, .price-card.selected { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--shadow); }
    .price-card .price-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .price-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; }
    .price-card .amount { font-size: 1.8rem; font-weight: 900; color: var(--accent); margin: 8px 0; }
    .price-card p { font-size: 0.85rem; color: #888; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="progress.html"><span class="icon">📊</span> Успеваемость</a>
  <a href="payments.html" class="active"><span class="icon">💳</span> Оплата</a>
  <a href="tickets.html"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>💳 Оплата курса</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <!-- Выбор ребёнка -->
  <div class="content-card" style="padding:14px 24px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-weight:700;">Ребёнок:</span>
      <select id="childSelect"
        style="border:2px solid #eee;border-radius:20px;padding:8px 16px;font-family:inherit;outline:none;flex:1;max-width:300px;">
        <option value="">Загрузка...</option>
      </select>
    </div>
  </div>

  <!-- Тарифы -->
  <div class="content-card">
    <h2>Выберите тариф</h2>
    <p style="color:#888;font-size:0.9rem;margin-bottom:20px;">⚠️ Тестовый режим — деньги не списываются</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">
      <div class="price-card selected" onclick="selectTariff('weekday',7500,this)">
        <div class="price-icon">🏫</div>
        <h3>Будни</h3>
        <div class="amount">7 500₽</div>
        <p>Пн-Пт, очно</p>
      </div>
      <div class="price-card" onclick="selectTariff('weekend',8200,this)">
        <div class="price-icon">🌅</div>
        <h3>Выходные</h3>
        <div class="amount">8 200₽</div>
        <p>Сб-Вс, очно</p>
      </div>
      <div class="price-card" onclick="selectTariff('online',15000,this)">
        <div class="price-icon">💻</div>
        <h3>Онлайн</h3>
        <div class="amount">15 000₽</div>
        <p>Любой день, онлайн</p>
      </div>
    </div>
    <button onclick="submitPayment()" class="btn-accent" style="width:100%;border-radius:20px;padding:14px;font-size:1.1rem;">
      ✅ Оплатить
    </button>
  </div>

  <!-- История оплат -->
  <div class="content-card">
    <h2>История оплат</h2>
    <div id="payHistory"><p style="color:#888;text-align:center;padding:20px;">Загрузка...</p></div>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['parent']);
  let selectedType = 'weekday';
  let selectedAmount = 7500;

  function selectTariff(type, amount, el) {
    selectedType = type;
    selectedAmount = amount;
    document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    playSound('ding');
  }

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;
    document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';

    const children = await api('/api/parent/children') || [];
    const sel = document.getElementById('childSelect');
    if (!children.length) { sel.innerHTML = '<option>Дети не привязаны</option>'; }
    else sel.innerHTML = children.map(c => `<option value="${c._id}">${c.firstName} ${c.lastName||''}</option>`).join('');

    loadHistory();
  }

  async function loadHistory() {
    const payments = await api('/api/payments') || [];
    const typeLabel = { weekday:'Будни', weekend:'Выходные', online:'Онлайн' };
    document.getElementById('payHistory').innerHTML = payments.length
      ? `<table class="app-table">
          <thead><tr><th>Дата</th><th>Ученик</th><th>Тариф</th><th>Сумма</th><th>Статус</th></tr></thead>
          <tbody>${payments.map(p => `
            <tr>
              <td style="color:#888;font-size:0.85rem;">${new Date(p.createdAt).toLocaleDateString('ru')}</td>
              <td style="font-weight:600;">${p.studentId?.firstName||''} ${p.studentId?.lastName||''}</td>
              <td>${typeLabel[p.type]||p.type}</td>
              <td style="font-weight:700;color:var(--accent);">${(p.amount||0).toLocaleString('ru')}₽</td>
              <td><span class="badge badge-success">✓ Оплачено</span></td>
            </tr>`).join('')}
          </tbody>
        </table>`
      : '<p style="color:#888;text-align:center;padding:20px;">Оплат пока нет</p>';
  }

  async function submitPayment() {
    const studentId = document.getElementById('childSelect').value;
    if (!studentId) { showToast('Выберите ребёнка', 'error'); return; }
    const res = await api('/api/payments', {
      method: 'POST',
      body: JSON.stringify({ studentId, type: selectedType, amount: selectedAmount })
    });
    if (res?._id) {
      showToast('Оплата прошла успешно! ✅');
      launchConfetti();
      loadHistory();
    } else {
      showToast(res?.error || 'Ошибка оплаты', 'error');
    }
  }

  init();
</script>
</body>
</html>
