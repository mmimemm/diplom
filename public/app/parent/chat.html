<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чаты — IT-MANIA</title>
  <link rel="icon" href="../../images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .chat-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .chat-tab {
      padding: 10px 24px;
      border-radius: 30px;
      border: 2px solid #1a1a2e;
      background: white;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-tab:hover { background: var(--bg); }
    .chat-tab.active { background: #1a1a2e; color: white; }

    .chat-info {
      color: #666;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .chat-messages {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 300px;
      max-height: calc(100vh - 340px);
      border: 2px solid #1a1a2e;
      border-radius: 16px;
      padding: 16px;
      background: #fafafa;
      margin-bottom: 12px;
    }

    .chat-message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      animation: messageSlideIn 0.35s ease both;
    }
    @keyframes messageSlideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .chat-message.mine {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-message.theirs {
      background: var(--bg);
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-message .msg-header {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-bottom: 4px;
    }
    .chat-message .msg-text {
      word-break: break-word;
      line-height: 1.4;
    }

    .chat-form {
      display: flex;
      gap: 8px;
    }
    .chat-form input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 30px;
      border: 2px solid #1a1a2e;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-form input:focus { border-color: var(--accent); }
    .chat-form button {
      padding: 14px 28px;
      border-radius: 30px;
      background: #1a1a2e;
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .chat-form button:hover { background: var(--accent); }

    .chat-placeholder {
      color: #888;
      text-align: center;
      padding: 40px 20px;
    }

    /* Выбор ребёнка для чата с преподавателем */
    .child-chat-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .child-chat-btn {
      padding: 10px 20px;
      border-radius: 30px;
      border: 2px solid var(--accent);
      background: white;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .child-chat-btn:hover { background: var(--bg); }
    .child-chat-btn.active {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(153,0,255,0.3);
    }
    .child-chat-btn .child-sub {
      font-size: 0.75rem;
      opacity: 0.7;
      font-weight: 400;
    }
    .child-chat-btn.active .child-sub { opacity: 0.8; }

    /* Пульсирующая точка новых сообщений */
    .chat-unread-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      margin-left: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Анимация появления контактов */
    .admin-contact-btn {
      animation: fadeInUp 0.4s ease both;
    }
    .admin-contact-btn:nth-child(1) { animation-delay: 0.05s; }
    .admin-contact-btn:nth-child(2) { animation-delay: 0.1s; }
    .admin-contact-btn:nth-child(3) { animation-delay: 0.15s; }
    .admin-contact-btn:nth-child(4) { animation-delay: 0.2s; }

    @media (max-width: 768px) {
      .chat-messages { max-height: calc(100vh - 380px); }
      .chat-message { max-width: 85%; }
    }
    @media (max-width: 480px) {
      .chat-tab { padding: 8px 16px; font-size: 0.85rem; }
      .chat-form input { padding: 12px 16px; font-size: 0.9rem; }
      .chat-form button { padding: 12px 20px; font-size: 1rem; }
      .child-chat-btn { padding: 8px 14px; font-size: 0.8rem; }
      .chat-messages { max-height: calc(100vh - 400px); min-height: 200px; }
    }
    @media (max-width: 360px) {
      .chat-tab { font-size: 0.8rem; padding: 6px 12px; }
      .chat-message { max-width: 92%; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="progress.html"><span class="icon">📊</span> Успеваемость</a>
  <a href="payments.html"><span class="icon">💳</span> Оплата</a>
  <a href="chat.html" class="active"><span class="icon">💬</span> Чаты</a>
  <a href="tickets.html"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="profile.html"><span class="icon">👤</span> Профиль</a>
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>

<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle">☰</button>
    <h1>💬 Чаты</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <div class="chat-tabs">
    <button class="chat-tab active" data-tab="teacher">
      <span class="tab-icon">👨‍🏫</span> Преподаватель ребёнка
    </button>
    <button class="chat-tab" data-tab="admin">
      <span class="tab-icon">⚙️</span> Администратор
    </button>
  </div>

  <!-- Область чата с преподавателем -->
  <div id="teacherChatArea">
    <div class="chat-info" id="teacherChatInfo">Выберите ребёнка, чтобы написать его преподавателю</div>

    <div class="child-chat-selector" id="childSelector"></div>

    <div class="chat-messages" id="teacherMessages">
      <div class="chat-placeholder">Загрузка...</div>
    </div>

    <form class="chat-form" id="teacherChatForm">
      <input type="text" id="teacherMsgInput" placeholder="Введите сообщение преподавателю..." required>
      <button type="submit">📤</button>
    </form>
  </div>

  <!-- Область чата с администратором -->
  <div id="adminChatArea" style="display:none;">
    <div class="chat-info">💬 Чат с администрацией</div>

    <div class="admin-contacts" id="adminContacts" style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;"></div>

    <div class="chat-messages" id="adminMessages">
      <div class="chat-placeholder">Выберите администратора для начала чата</div>
    </div>

    <form class="chat-form" id="adminChatForm" style="display:none;">
      <input type="text" id="adminMsgInput" placeholder="Введите сообщение администратору..." required>
      <button type="submit">📤</button>
    </form>
  </div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
(async function() {
  if (!requireAuth(['parent'])) return;

  // ---- STATE ----
  let activeTab = 'teacher';
  let currentUser = null;
  let children = [];
  let teachers = {};          // childId -> { firstName, lastName, _id }
  let selectedChildId = null;
  let selectedAdminId = null;
  let admins = [];
  let lastTeacherMsgId = '';
  let lastAdminMsgId = {};

  // ---- DOM ----
  const teacherMessages = document.getElementById('teacherMessages');
  const adminMessages = document.getElementById('adminMessages');
  const teacherChatInfo = document.getElementById('teacherChatInfo');
  const teacherForm = document.getElementById('teacherChatForm');
  const teacherInput = document.getElementById('teacherMsgInput');
  const adminForm = document.getElementById('adminChatForm');
  const adminInput = document.getElementById('adminMsgInput');
  const tabBtns = document.querySelectorAll('.chat-tab');
  const teacherArea = document.getElementById('teacherChatArea');
  const adminArea = document.getElementById('adminChatArea');
  const childSelector = document.getElementById('childSelector');
  const adminContacts = document.getElementById('adminContacts');

  function getTeacherId(child) {
    // teacherId может быть ObjectId или объектом { _id, firstName, lastName }
    if (!child) return null;
    if (typeof child.teacherId === 'object' && child.teacherId && child.teacherId._id) {
      return child.teacherId._id;
    }
    return child.teacherId || null;
  }

  function getTeacherById(teacherId) {
    if (!teacherId) return null;
    // Ищем в кэше teachers
    if (teachers[teacherId]) return teachers[teacherId];
    // Может быть teacherId уже объект
    if (typeof teacherId === 'object' && teacherId._id) {
      if (teachers[teacherId._id]) return teachers[teacherId._id];
      return teacherId;
    }
    return null;
  }

  // ---- INIT ----
  async function init() {
    try {
      currentUser = await api('/api/auth/me');
      if (!currentUser) {
        teacherMessages.innerHTML = '<div class="chat-placeholder" style="color:#c00;">Не удалось загрузить профиль</div>';
        return;
      }

      if (typeof updateTopbarAvatar === 'function') {
        await updateTopbarAvatar(currentUser);
      } else {
        const avatar = document.getElementById('userAvatar');
        if (avatar) avatar.textContent = (currentUser.firstName || '?')[0].toUpperCase();
      }

      // Загружаем детей
      children = await api('/api/parent/children') || [];

      if (!children.length) {
        childSelector.innerHTML = '<p style="color:#888;font-size:0.9rem;">Дети не привязаны к аккаунту</p>';
        teacherMessages.innerHTML = '<div class="chat-placeholder">Добавьте детей, чтобы писать преподавателям</div>';
      } else {
        // Для каждого ребёнка узнаём преподавателя
        await loadChildrenTeachers();
        renderChildSelector();
      if (children.length > 0) {
        window._selectChild(children[0]._id);
      }
      }

      // Загружаем администраторов
      await loadAdmins();
    } catch (err) {
      console.error('Chat init error:', err);
      teacherMessages.innerHTML = '<div class="chat-placeholder" style="color:#c00;">Ошибка загрузки</div>';
    }
  }

  async function loadChildrenTeachers() {
    for (const child of children) {
      // Если teacherId уже пришёл как объект с данными
      if (child.teacherId && typeof child.teacherId === 'object' && (child.teacherId.firstName || child.teacherId._id)) {
        var t = child.teacherId;
        var tid = t._id || t.toString();
        teachers[tid] = t;
        continue;
      }
      // Если teacherId — просто ID строка, загружаем
      if (child.teacherId && typeof child.teacherId === 'string') {
        const teacher = await api('/api/user/' + child.teacherId);
        if (teacher) teachers[child.teacherId] = teacher;
        continue;
      }
      // Если teacherId — ObjectId от mongoose, у него может быть toString
      if (child.teacherId) {
        try {
          var tidStr = child.teacherId.toString();
          const teacher = await api('/api/user/' + tidStr);
          if (teacher) teachers[tidStr] = teacher;
        } catch(e) {}
      }
    }
  }

  async function loadAdmins() {
    admins = await api('/api/admins') || [];
    if (!admins.length) {
      adminContacts.innerHTML = '<p style="color:#888;font-size:0.9rem;">Нет доступных администраторов</p>';
      return;
    }

    if (admins.length === 1) {
      // Один админ — не показываем список, сразу открываем чат
      adminContacts.innerHTML = '';
      window._selectAdmin(admins[0]._id);
      return;
    }

    adminContacts.innerHTML = admins.map(function(a) {
      const name = [a.firstName, a.lastName].filter(Boolean).join(' ') || 'Администратор';
      const initial = (a.firstName || 'A')[0].toUpperCase();
      return '<button class="child-chat-btn admin-contact-btn" data-admin-id="' + a._id + '" onclick="window._selectAdmin(\'' + a._id + "')\">" +
        initial + ' ' + name +
        '</button>';
    }).join('');

    window._selectAdmin(admins[0]._id);
  }

  window._selectAdmin = function(adminId) {
    selectedAdminId = adminId;
    document.querySelectorAll('#adminContacts .child-chat-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.adminId === adminId);
    });
    document.getElementById('adminChatForm').style.display = 'flex';
    lastAdminMsgId[adminId] = '';
    loadAdminMessages();
    playSound('swipe');
  };

  function renderChildSelector() {
    childSelector.innerHTML = children.map(function(c) {
      var tid = getTeacherId(c);
      var teacher = null;
      if (tid) teacher = getTeacherById(tid);
      var teacherName = teacher ? [teacher.firstName, teacher.lastName].filter(Boolean).join(' ') : 'Не назначен';
      return '<button class="child-chat-btn" data-child-id="' + c._id + '" onclick="window._selectChild(\'' + c._id + "')\">" +
        (c.firstName || '') + ' ' + (c.lastName || '') +
        '<br><span class="child-sub">👨‍🏫 ' + teacherName + '</span>' +
        '</button>';
    }).join('');
  }

  window._selectChild = function(childId) {
    selectedChildId = childId;
    document.querySelectorAll('.child-chat-btn[data-child-id]').forEach(function(b) {
      b.classList.toggle('active', b.dataset.childId === childId);
    });

    var child = children.find(function(c) { return c._id === childId; });
    var tid = child ? getTeacherId(child) : null;
    var teacher = tid ? getTeacherById(tid) : null;
    var childName = child ? [child.firstName, child.lastName].filter(Boolean).join(' ') : 'Ребёнок';
    var teacherName = teacher ? [teacher.firstName, teacher.lastName].filter(Boolean).join(' ') : 'Преподаватель';
    teacherChatInfo.textContent = '👨‍🏫 Чат с преподавателем (' + childName + '): ' + teacherName;

    lastTeacherMsgId = '';
    loadTeacherMessages();
    playSound('swipe');
  };

  // ---- ЗАГРУЗКА СООБЩЕНИЙ: ЧАТ С ПРЕПОДАВАТЕЛЕМ ----
  async function loadTeacherMessages() {
    if (!selectedChildId) return;

    var messages = await api('/api/parent/teacher-chat/' + selectedChildId) || [];
    if (!messages.length) {
      teacherMessages.innerHTML = '<div class="chat-placeholder">Сообщений пока нет. Напишите первое!</div>';
      return;
    }

    lastTeacherMsgId = messages[messages.length - 1]._id;
    renderTeacherMessages(messages);
    scrollToBottom(teacherMessages);
  }

  function renderTeacherMessages(msgs) {
    if (!msgs || !msgs.length) {
      teacherMessages.innerHTML = '<div class="chat-placeholder">Сообщений пока нет. Напишите первое!</div>';
      return;
    }
    teacherMessages.innerHTML = msgs.map(function(m) {
      var isMine = m.from === 'parent';
      var senderName = isMine ? 'Вы' : safeText(m.userName || 'Преподаватель');
      var cls = isMine ? 'mine' : 'theirs';
      var time = new Date(m.createdAt).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
      return '<div class="chat-message ' + cls + '">' +
        '<div class="msg-header">' + senderName + ' · ' + time + '</div>' +
        '<div class="msg-text">' + safeText(m.text || '') + '</div>' +
        '</div>';
    }).join('');
  }

  // ---- ОТПРАВКА: ЧАТ С ПРЕПОДАВАТЕЛЕМ ----
  teacherForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    var text = teacherInput.value.trim();
    if (!text || !selectedChildId) return;

    teacherInput.disabled = true;
    try {
      var resp = await fetch('/api/parent/teacher-chat/' + selectedChildId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ text: text })
      });

      if (!resp.ok) {
        var err = await resp.json().catch(function() { return {}; });
        showToast(err.error || 'Ошибка отправки', 'error');
        return;
      }

      teacherInput.value = '';
      playSound('success');
      lastTeacherMsgId = '';
      await loadTeacherMessages();
    } catch (err) {
      console.error('Send error:', err);
      showToast('Ошибка соединения', 'error');
    } finally {
      teacherInput.disabled = false;
      teacherInput.focus();
    }
  });

  // ---- ЗАГРУЗКА СООБЩЕНИЙ: ЧАТ С АДМИНИСТРАТОРОМ ----
  async function loadAdminMessages() {
    if (!selectedAdminId) {
      adminMessages.innerHTML = '<div class="chat-placeholder">Выберите администратора для начала чата</div>';
      document.getElementById('adminChatForm').style.display = 'none';
      return;
    }

    var messages = await api('/api/parent/admin-chat/' + selectedAdminId) || [];

    if (!messages.length) {
      adminMessages.innerHTML = '<div class="chat-placeholder">Сообщений пока нет. Напишите первое!</div>';
      document.getElementById('adminChatForm').style.display = 'flex';
      return;
    }

    lastAdminMsgId[selectedAdminId] = messages[messages.length - 1]._id;
    renderAdminMessages(messages);
    scrollToBottom(adminMessages);
  }

  function renderAdminMessages(msgs) {
    if (!msgs || !msgs.length) {
      adminMessages.innerHTML = '<div class="chat-placeholder">Сообщений пока нет. Напишите первое!</div>';
      return;
    }
    adminMessages.innerHTML = msgs.map(function(m) {
      var isMine = m.from === 'parent';
      var senderName = isMine ? 'Вы' : safeText(m.userName || 'Администратор');
      var cls = isMine ? 'mine' : 'theirs';
      var time = new Date(m.createdAt).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
      return '<div class="chat-message ' + cls + '">' +
        '<div class="msg-header">' + senderName + ' · ' + time + '</div>' +
        '<div class="msg-text">' + safeText(m.text || '') + '</div>' +
        '</div>';
    }).join('');
  }

  // ---- ОТПРАВКА: ЧАТ С АДМИНИСТРАТОРОМ ----
  adminForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    var text = adminInput.value.trim();
    if (!text || !selectedAdminId) return;

    adminInput.disabled = true;
    try {
      var resp = await fetch('/api/parent/admin-chat/' + selectedAdminId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ text: text })
      });

      if (!resp.ok) {
        var err = await resp.json().catch(function() { return {}; });
        showToast(err.error || 'Ошибка отправки', 'error');
        return;
      }

      adminInput.value = '';
      playSound('success');
      lastAdminMsgId[selectedAdminId] = '';
      await loadAdminMessages();
    } catch (err) {
      console.error('Send error:', err);
      showToast('Ошибка соединения', 'error');
    } finally {
      adminInput.disabled = false;
      adminInput.focus();
    }
  });

  // ---- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ----
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = this.dataset.tab;
      if (tab === activeTab) return;
      activeTab = tab;
      tabBtns.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');

      teacherArea.style.display = tab === 'teacher' ? 'block' : 'none';
      adminArea.style.display = tab === 'admin' ? 'block' : 'none';
      playSound('swipe');
    });
  });

  // ---- AUTO-REFRESH ----
  setInterval(function() {
    if (activeTab === 'teacher' && selectedChildId) {
      loadTeacherMessagesSilent();
    }
    if (activeTab === 'admin' && selectedAdminId) {
      loadAdminMessagesSilent();
    }
  }, 5000);

  async function loadTeacherMessagesSilent() {
    if (!selectedChildId) return;

    var messages = await api('/api/parent/teacher-chat/' + selectedChildId) || [];
    if (!messages.length) return;

    var lastId = lastTeacherMsgId;
    var lastIdx = -1;
    if (lastId) {
      for (var i = messages.length - 1; i >= 0; i--) {
        if (messages[i]._id === lastId) { lastIdx = i; break; }
      }
    }

    var newMsgs = lastIdx >= 0 ? messages.slice(lastIdx + 1) : [];
    if (newMsgs.length === 0 && lastId) return;

    if (lastIdx < 0 && lastId) {
      // полный перерендер
      renderTeacherMessages(messages);
    } else if (newMsgs.length > 0) {
      var placeholder = teacherMessages.querySelector('.chat-placeholder');
      if (placeholder) placeholder.remove();
      appendMessages(teacherMessages, newMsgs, 'parent');
      if (document.hidden === undefined || !document.hidden) {
        playSound('ding');
      }
    }

    if (messages.length > 0) {
      lastTeacherMsgId = messages[messages.length - 1]._id;
    }
    scrollToBottom(teacherMessages);
  }

  async function loadAdminMessagesSilent() {
    if (!selectedAdminId) return;

    var messages = await api('/api/parent/admin-chat/' + selectedAdminId) || [];
    if (!messages.length) return;

    var lastId = lastAdminMsgId[selectedAdminId] || '';
    var lastIdx = -1;
    if (lastId) {
      for (var i = messages.length - 1; i >= 0; i--) {
        if (messages[i]._id === lastId) { lastIdx = i; break; }
      }
    }

    var newMsgs = lastIdx >= 0 ? messages.slice(lastIdx + 1) : [];
    if (newMsgs.length === 0 && lastId) return;

    if (lastIdx < 0 && lastId) {
      renderAdminMessages(messages);
    } else if (newMsgs.length > 0) {
      var placeholder = adminMessages.querySelector('.chat-placeholder');
      if (placeholder) placeholder.remove();
      appendMessages(adminMessages, newMsgs, 'parent');
      if (document.hidden === undefined || !document.hidden) {
        playSound('ding');
      }
    }

    if (messages.length > 0) {
      lastAdminMsgId[selectedAdminId] = messages[messages.length - 1]._id;
    }
    scrollToBottom(adminMessages);
  }

  function appendMessages(container, msgs, ownFrom) {
    msgs.forEach(function(m) {
      var isMine = m.from === ownFrom;
      var senderName = isMine ? 'Вы' : safeText(m.userName || '?');
      var cls = isMine ? 'mine' : 'theirs';
      var time = new Date(m.createdAt).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

      var div = document.createElement('div');
      div.className = 'chat-message ' + cls;
      div.innerHTML = '<div class="msg-header">' + senderName + ' · ' + time + '</div><div class="msg-text">' + safeText(m.text || '') + '</div>';
      container.appendChild(div);
    });
  }

  function safeText(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function scrollToBottom(el) {
    setTimeout(function() { el.scrollTop = el.scrollHeight; }, 50);
  }

  // ---- START ----
  await init();
})();
</script>

  <script src="../../js/theme-manager.js"></script>
</body>
