<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Успеваемость — IT-MANIA</title>
  <link rel="stylesheet" href="../../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../../images/star.gif?v=2" alt="IT-MANIA" onerror="this.onerror=null; this.src='../../images/star.png'">
    <span>IT-MANIA</span>
  </div>
  <a href="dashboard.html"><span class="icon">🏠</span> Главная</a>
  <a href="progress.html" class="active"><span class="icon">📊</span> Успеваемость</a>
  <a href="payments.html"><span class="icon">💳</span> Оплата</a>
  <a href="tickets.html"><span class="icon">🎫</span> Обращения</a>
  <div class="sidebar-bottom">
    <a href="#" id="logoutBtn"><span class="icon">🚪</span> Выйти</a>
  </div>
</aside>
<main class="main-content">
  <div class="topbar">
    <button id="sidebarToggle" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">☰</button>
    <h1>📊 Успеваемость</h1>
    <div class="topbar-right">
      <button class="sound-btn" id="soundBtn">🔊</button>
      <button class="notif-btn">🔔 <span class="notif-badge" id="notifBadge"></span></button>
      <div class="user-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <!-- Выбор ребёнка -->
  <div class="content-card" style="padding:14px 24px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-weight:700;">Ребёнок:</span>
      <select id="childSelect" onchange="loadChildProgress()"
        style="border:2px solid #eee;border-radius:20px;padding:8px 16px;font-family:inherit;outline:none;flex:1;max-width:300px;">
        <option value="">Загрузка...</option>
      </select>
    </div>
  </div>

  <div id="progressContent"></div>
</main>

<div id="cat-assistant">
  <div class="cat-bubble" id="catBubble"></div>
  <img src="../../images/mini.png" alt="Кот" onerror="this.onerror=null; this.src='../../images/cat.png'">
</div>

<script src="../../js/app.js"></script>
<script>
  requireAuth(['parent']);
  let children = [];
  let chartInstance = null;

  async function init() {
    const user = await api('/api/auth/me');
    if (!user) return;
    document.getElementById('userAvatar').textContent = user.firstName?.charAt(0) || '?';

    children = await api('/api/parent/children') || [];
    const sel = document.getElementById('childSelect');
    if (!children.length) {
      sel.innerHTML = '<option>Дети не привязаны</option>';
      return;
    }
    sel.innerHTML = children.map(c => `<option value="${c._id}">${c.firstName} ${c.lastName || ''}</option>`).join('');
    loadChildProgress();
  }

  async function loadChildProgress() {
    const childId = document.getElementById('childSelect').value;
    if (!childId) return;
    const child = children.find(c => c._id === childId);
    const progress = await api(`/api/progress/${childId}`) || [];

    const levelNames = { 1:'Новичок', 2:'Юный хакер', 3:'Кодер', 5:'Магистр кода', 10:'Мастер IT' };
    const lvl = child?.level || 1;

    document.getElementById('progressContent').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-info"><h3>${child?.xp||0}</h3><p>Очки XP</p></div></div>
        <div class="stat-card"><div class="stat-icon">🏅</div><div class="stat-info"><h3>${lvl}</h3><p>${levelNames[lvl]||'Уровень '+lvl}</p></div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-info"><h3>${progress.length}</h3><p>Заданий сдано</p></div></div>
        <div class="stat-card"><div class="stat-icon">🎫</div><div class="stat-info"><h3>${child?.tickets||0}</h3><p>Билетики</p></div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="content-card">
          <h2>📈 Активность по месяцам</h2>
          <canvas id="progressChart" height="200"></canvas>
        </div>
        <div class="content-card">
          <h2>🏆 Достижения</h2>
          <div style="display:flex;flex-wrap:wrap;gap:10px;">
            ${child?.badges?.length
              ? child.badges.map(b => `<div class="badge-item"><div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div></div>`).join('')
              : '<p style="color:#888;font-size:0.9rem;">Пока нет достижений</p>'}
          </div>
        </div>
      </div>

      <div class="content-card">
        <h2>📋 Выполненные задания</h2>
        ${progress.length ? `
          <table class="app-table">
            <thead><tr><th>Урок</th><th>Оценка</th><th>Билетики</th><th>Дата</th></tr></thead>
            <tbody>
              ${progress.map(p => `
                <tr>
                  <td style="font-weight:600;">${p.lessonId?.title || 'Урок'}</td>
                  <td><span class="badge ${p.score>=70?'badge-success':p.score>=50?'badge-warn':'badge-danger'}">${p.score||0}%</span></td>
                  <td style="color:var(--accent);font-weight:700;">🎫 ${p.tickets||0}</td>
                  <td style="color:#888;font-size:0.85rem;">${new Date(p.checkedAt||p.submittedAt).toLocaleDateString('ru')}</td>
                </tr>`).join('')}
            </tbody>
          </table>` : '<p style="color:#888;text-align:center;padding:20px;">Заданий пока нет</p>'}
      </div>`;

    // График
    const months = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
    const counts = new Array(12).fill(0);
    progress.forEach(p => { const m = new Date(p.checkedAt||p.submittedAt).getMonth(); if(m>=0) counts[m]++; });
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('progressChart'), {
      type: 'line',
      data: { labels: months, datasets: [{ label: 'Задания', data: counts,
        borderColor: '#9900FF', backgroundColor: 'rgba(153,0,255,0.1)', fill: true, tension: 0.4, pointBackgroundColor: '#9900FF' }] },
      options: { plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, grid: { color: '#f0e8ff' } }, x: { grid: { display: false } } } }
    });
  }

  init();
</script>
</body>
</html>
